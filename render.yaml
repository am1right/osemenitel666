databases:
  - name: chin-games-db
    plan: free
    databaseName: chin_games
    user: chin_games

services:
  - type: web
    name: telegram-arcade-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: chin-games-db
          property: connectionString
