<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дурак — Комната лобби</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(180deg, #0d081a 0%, #120b2e 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .durak-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 16px;
            padding-top: 90px; /* базовый отступ, JS подкрутит под safe area */
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(90deg, #d122e3, #a31bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .create-btn {
            background: linear-gradient(90deg, #d122e3, #a31bb8);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 999px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .lobby-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lobby-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(209, 34, 227, 0.25);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lobby-info h3 {
            margin: 0 0 4px;
            font-size: 1.1rem;
        }

        .lobby-meta {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        .join-btn {
            background: rgba(209, 34, 227, 0.15);
            color: #d122e3;
            border: 1px solid #d122e3;
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            font-size: 0.85rem;
            color: #fff;
            cursor: pointer;
        }

        .filter-btn.active {
            background: rgba(209, 34, 227, 0.2);
            border-color: #d122e3;
            color: #d122e3;
        }

        </style>
</head>
<body>
    <div class="durak-container">

        <!-- ================== КОМНАТА ОЖИДАНИЯ ================== -->
        <!-- Эта страница отвечает ТОЛЬКО за конкретное лобби (?lobby=ID).
             Список лобби и создание живут в durak.html. -->
        <div id="waiting-room-view" style="display: none;">
            <div class="header">
                <h1>🃏 Комната ожидания</h1>
                <div style="display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end;">
                    <button id="edit-settings-btn" onclick="openEditSettingsModal()" 
                            style="background:#3a2a6e; color:#ccc; border:1px solid #6655aa; padding:6px 10px; border-radius:8px; display:none; font-size:0.85rem;">
                        ⚙ Настройки
                    </button>

                    <button onclick="inviteToCurrentLobby()" 
                            style="background:#a31bb8; color:#000; border:none; padding:6px 10px; border-radius:8px; font-weight:600; font-size:0.85rem;">
                        ➕ Пригласить
                    </button>

                    <button onclick="leaveCurrentLobby()" style="background:#ff4466; color:white; border:none; padding:6px 10px; border-radius:8px; font-size:0.85rem;">
                        Выйти
                    </button>
                </div>
            </div>

            <div id="lobby-info" style="margin-bottom: 16px; background: rgba(255,255,255,0.05); padding:12px; border-radius:10px;">
                <!-- Информация о лобби будет сюда -->
            </div>

            <!-- Пригласить друзей (только в лобби до старта) -->
            <div id="invite-section" style="margin-bottom: 16px; text-align: center;">
                <button onclick="inviteToCurrentLobby()" 
                        style="background: linear-gradient(90deg, #a31bb8, #d122e3); 
                               color: #000; 
                               border: none; 
                               padding: 10px 16px; 
                               border-radius: 999px; 
                               font-weight: 700;
                               font-size: 0.95rem;
                               box-shadow: 0 4px 12px rgba(209, 34, 227, 0.3);
                               max-width: 100%;
                               white-space: normal;
                               line-height: 1.2;">
                    ➕ Пригласить друзей в это лобби
                </button>
                <div style="font-size: 0.72rem; color: #888; margin-top: 6px;">
                    Ссылка приведёт друга прямо в это лобби
                </div>
            </div>

            <!-- Уведомления лобби (живые события) -->
            <div id="lobby-notifications" style="margin-bottom: 12px; min-height: 0;"></div>

            <div id="ready-status" style="margin-bottom: 12px; font-size: 0.95rem; color: #ccc;">
                <!-- Сюда будет подставляться "Готовы: X / Y" -->
            </div>

            <h3 style="margin: 0 0 10px;">Игроки в лобби</h3>
            <div id="players-list" class="lobby-list">
                <!-- Список игроков -->
            </div>

            <div style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
                <button id="ready-btn" onclick="toggleReady()" 
                        style="flex:1; padding:14px; font-size:1.05rem; border-radius:12px; font-weight:600;">
                    Готов
                </button>

                <button id="start-btn" onclick="startGame()" 
                        style="flex:1; padding:14px; font-size:1.05rem; border-radius:12px; background:#a31bb8; color:#000; font-weight:700; display:none;">
                    Начать игру
                </button>
            </div>

            <div style="margin-top: 20px; font-size: 0.85rem; color: #888;">
                Когда все игроки будут готовы и наберётся нужное количество — создатель сможет начать игру.
            </div>
        </div>

    </div>

    <!-- Красивое модальное подтверждение (для старта игры и т.д.) -->
    <div id="confirm-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); align-items:center; justify-content:center; z-index:1100;">
        <div style="background:#1a1633; border:1px solid #d122e3; border-radius:16px; padding:18px; width:min(92vw, 340px); box-sizing:border-box; overflow-x:hidden; text-align:center;">
            <h3 id="confirm-title" style="margin:0 0 12px 0; color:#fff; font-size:1.25rem;"></h3>
            <p id="confirm-message" style="margin:0 0 24px 0; color:#ccc; font-size:0.95rem; line-height:1.4;"></p>

            <div style="display:flex; gap:12px;">
                <button id="confirm-cancel-btn" 
                        style="flex:1; padding:12px; background:rgba(255,255,255,0.08); border:1px solid #555; color:#ddd; border-radius:12px; font-weight:600; transition: all 0.1s;">
                    Отмена
                </button>
                <button id="confirm-ok-btn" 
                        style="flex:1; padding:12px; background:#d122e3; color:#000; border:none; border-radius:12px; font-weight:700; transition: all 0.1s; box-shadow: 0 4px 12px rgba(209, 34, 227, 0.3);">
                    Начать игру
                </button>
            </div>
        </div>
    </div>

    <!-- Модал редактирования настроек лобби -->
    <div id="edit-settings-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:#1a103d; border:1px solid #6655aa; border-radius:16px; padding:18px; width:min(92vw, 340px); box-sizing:border-box; overflow-x:hidden; max-height:88vh; overflow-y:auto; -webkit-overflow-scrolling:touch;">
            <h3 style="margin-top:0;">Настройки лобби</h3>

            <div style="margin-bottom:12px;">
                <label>Количество игроков</label><br>
                <select id="edit-max-players" style="width:100%; padding:8px; border-radius:8px; background:#0f0a24; color:#fff; border:1px solid #6655aa;">
                    <option value="2">2 игрока</option>
                    <option value="3">3 игрока</option>
                    <option value="4">4 игрока</option>
                    <option value="5">5 игроков</option>
                    <option value="6">6 игроков</option>
                </select>
            </div>

            <div style="margin-bottom:12px;">
                <label>Колода</label><br>
                <select id="edit-deck-size" style="width:100%; padding:8px; border-radius:8px; background:#0f0a24; color:#fff; border:1px solid #6655aa;">
                    <option value="36">36 карт</option>
                    <option value="24">24 карты</option>
                    <option value="52">52 карты</option>
                </select>
            </div>

            <div style="margin-bottom:20px;">
                <label>Ставка (choin)</label><br>
                <input type="number" id="edit-bet-amount" min="0" max="1000000" step="10" style="width:100%; padding:8px; border-radius:8px; background:#0f0a24; color:#fff; border:1px solid #6655aa;">
            </div>

            <div style="display:flex; gap:10px;">
                <button onclick="closeEditSettingsModal()" style="flex:1; padding:12px; background:rgba(255,255,255,0.1); border:1px solid #fff; color:#fff; border-radius:12px;">Отмена</button>
                <button onclick="saveLobbySettings()" style="flex:1; padding:12px; background:#6655aa; color:white; border:none; border-radius:12px; font-weight:700;">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Глобальный перехват ошибок, чтобы видеть проблемы в консоли
        window.addEventListener('error', (e) => {
            console.error('Global error in Durak room:', e.message, e.filename, e.lineno);
        });

        const tg = window.Telegram.WebApp;
        tg.ready();
        // Полный экран только на телефоне (ПК не разворачиваем агрессивно)
        if (typeof window.initTelegramFullscreen === 'function') {
          window.initTelegramFullscreen();
        } else {
          tg.expand();
        }

        // ── Top padding под шапку Telegram (как в shop.html) ──
        function applyDurakTopPadding() {
            const container = document.querySelector('.durak-container');
            if (!container) return;

            const tgTop  = tg.contentSafeAreaInsets?.top ?? 0;
            const sysTop = tg.safeAreaInsets?.top ?? 0;
            // Минимум ~90-100px как в других страницах
            const topPad = Math.max(Math.max(tgTop, sysTop), 90);
            container.style.paddingTop = topPad + 'px';
        }
        applyDurakTopPadding();
        setTimeout(applyDurakTopPadding, 350);
        tg.onEvent('viewportChanged', applyDurakTopPadding);
        tg.onEvent('safeAreaChanged', applyDurakTopPadding);
        tg.onEvent('contentSafeAreaChanged', applyDurakTopPadding);

        let currentLobbyId = null;
        let currentUserId = null;
        let playersRefreshInterval = null;

        // ── Кнопка "Назад" вместо крестика для меню Дурака Онлайн ──
        // Показываем кнопку при входе на страницу. Она остаётся видимой всё время,
        // пока пользователь находится внутри меню Дурака (список лобби или конкретное лобби).
        if (tg.BackButton) {
            tg.BackButton.show();

            tg.BackButton.onClick(() => {
                if (currentLobbyId && typeof leaveCurrentLobby === 'function') {
                    // В комнате → выходим из лобби (leaveCurrentLobby вернёт в меню durak.html)
                    leaveCurrentLobby();
                } else {
                    window.location.href = 'durak.html';
                }
            });
        }

        // ================== КОМНАТА ОЖИДАНИЯ ==================

        function enterWaitingRoom(lobbyId, lobbyData = null) {
            currentLobbyId = lobbyId;
            currentLobbyData = lobbyData;

            const wrv = document.getElementById('waiting-room-view');
            if (wrv) wrv.style.display = 'block';

            // Убедимся что шапка видна (могла быть спрятана в предыдущей игре)
            const wH = document.querySelector('#waiting-room-view .header');
            if (wH) wH.style.display = '';

            // Загружаем информацию о лобби (чтобы сразу понять статус)
            loadLobbyInfo().then(() => {
                // Если уже playing — сразу показываем игровую комнату и инициализируем сокет
                if (currentLobbyData && currentLobbyData.status === 'playing') {
                    // Check game over
                    (async () => {
                        try {
                            const res = await (window.apiFetch || fetch)(`/api/durak/lobbies/${currentLobbyId}/state?user_id=${currentUserId||0}`);
                            const data = await res.json();
                            if (data.state && data.state.game_over) {
                                const info = document.getElementById('lobby-info');
                                if (info) info.innerHTML = `<strong>Игра окончена!</strong> Победитель #${data.state.winner||'?'}`;
                            } else {
                                window.location.href = `durak-game.html?lobby=${currentLobbyId}`;
                            }
                        } catch(e) {
                            window.location.href = `durak-game.html?lobby=${currentLobbyId}`;
                        }
                    })();
                    return;
                }

                loadPlayers();

                // Показываем кнопку настроек только создателю (если ещё можно редактировать)
                const editBtn = document.getElementById('edit-settings-btn');
                if (editBtn) {
                    const isCreator = currentUserId && currentLobbyData && currentUserId === currentLobbyData.creator_id;
                    const canEdit = isCreator && (currentLobbyData.current_players || 1) <= 1;
                    editBtn.style.display = canEdit ? 'inline-block' : 'none';
                }

                // Запускаем polling только если игра ещё не началась
                if (playersRefreshInterval) clearInterval(playersRefreshInterval);
                playersRefreshInterval = setInterval(async () => {
                    await loadLobbyInfo();

                    // Если во время опроса статус стал 'playing' — останавливаем polling
                    if (currentLobbyData && currentLobbyData.status === 'playing') {
                        if (playersRefreshInterval) {
                            clearInterval(playersRefreshInterval);
                            playersRefreshInterval = null;
                        }
                        return;
                    }

                    loadPlayers();
                }, 3000);
            });
        }

        async function loadLobbyInfo() {
            const infoEl = document.getElementById('lobby-info');

            try {
                const api = window.apiFetch || fetch;
                const res = await api(`/api/durak/lobbies/${currentLobbyId}`);

                if (!res.ok) {
                    throw new Error('Failed to load lobby info');
                }

                const lobby = await res.json();
                currentLobbyData = lobby;

                // Обновляем видимость кнопки настроек
                const editBtn = document.getElementById('edit-settings-btn');
                if (editBtn) {
                    const isCreator = currentUserId && lobby.creator_id === currentUserId;
                    const canEdit = isCreator && (lobby.current_players || 1) <= 1;
                    editBtn.style.display = canEdit ? 'inline-block' : 'none';
                }

                // === ИГРА ЗАПУЩЕНА → уходим на отдельный игровой экран ===
                if (lobby.status === 'playing') {
                    if (playersRefreshInterval) {
                        clearInterval(playersRefreshInterval);
                        playersRefreshInterval = null;
                    }
                    infoEl.innerHTML = `
                        <strong>Лобби #${lobby.id}</strong><br>
                        <span style="color:#d122e3; font-weight:600; font-size:1.05rem;">🎮 Игра запущена! Загружаем поле…</span>
                    `;
                    window.location.href = `durak-game.html?lobby=${currentLobbyId}`;
                    return;
                }

                // === ОБЫЧНОЕ СОСТОЯНИЕ (WAITING) ===
                const bet = lobby.bet_amount > 0 ? `${lobby.bet_amount * 10} choin` : 'Без ставки';
                const potText = (lobby.pot && lobby.pot > 0) ? ` • Банк: ${lobby.pot * 10} choin` : '';
                const typeText = lobby.game_type === 'podkidnoy' ? 'Подкидной' : 'Переводной';
                const cheatText = lobby.cheating_enabled ? 'Разрешено' : 'Запрещено';

                const displayName = lobby.name ? `<strong>${lobby.name}</strong> ` : '';
                const lobbyIdText = lobby.name ? `(Лобби #${lobby.id})` : `#${lobby.id}`;

                let stakeWarning = '';
                if (lobby.bet_amount > 0) {
                    stakeWarning = `<br><span style="color:#88ddaa; font-size:0.8rem;">Ставка возвращается при выходе до старта игры</span>`;
                }

                infoEl.innerHTML = `
                    ${displayName}<span style="font-size:0.85rem; color:#888;">${lobbyIdText}</span> 
                    <span style="font-size:0.8rem; color:#888;">(владелец: ${lobby.creator_name || 'Игрок'})</span><br>
                    <span style="font-size:0.85rem; color:#ccc;">
                        ${lobby.max_players} игроков • 
                        ${lobby.deck_size} карт • 
                        ${typeText} • 
                        Шулерство: ${cheatText} • 
                        Ставка: ${bet}${potText}
                    </span>
                    ${stakeWarning}
                `;

            } catch (e) {
                console.error("loadLobbyInfo error:", e);

                const msg = (e?.message || '').toLowerCase();
                if (msg.includes('404') || msg.includes('not found') || msg.includes('failed')) {
                    alert("Лобби больше не существует.");
                    exitWaitingRoom();
                    return;
                }

                // Fallback
                infoEl.innerHTML = `
                    <strong>Лобби #${currentLobbyId}</strong><br>
                    <span style="font-size:0.9rem; color:#aaa;">Ожидание игроков...</span>
                `;
            }
        }

        async function loadPlayers() {
            if (!currentLobbyId) return;

            // Если игра уже началась — не обновляем список игроков и не показываем старые кнопки
            if (currentLobbyData && currentLobbyData.status === 'playing') {
                return;
            }

            try {
                const api = window.apiFetch || fetch;
                const res = await api(`/api/durak/lobbies/${currentLobbyId}/players`);
                const data = await res.json();
                const players = data.players || [];

                const container = document.getElementById('players-list');
                container.innerHTML = '';

                const currentUserReady = players.find(p => p.user_id === currentUserId)?.is_ready || false;

                const creatorId = currentLobbyData?.creator_id;

                players.forEach(player => {
                    const div = document.createElement('div');
                    div.className = 'lobby-card';
                    const readyText = player.is_ready ? '✅ Готов' : '⏳ Не готов';

                    let extra = '';
                    if (player.user_id === creatorId) {
                        extra += ' <span style="color:#ffcc00; font-weight:600;">(Владелец)</span>';
                    }
                    if (player.user_id === currentUserId) {
                        extra += ' <span style="color:#d122e3;">(Вы)</span>';
                    }

                    div.innerHTML = `
                        <div>
                            <strong>${player.first_name || 'Игрок'}</strong>${extra}
                        </div>
                        <div style="font-size:0.85rem; color: ${player.is_ready ? '#d122e3' : '#ffaa00'};">
                            ${readyText}
                        </div>
                    `;
                    container.appendChild(div);
                });

                // Обновляем кнопку Ready
                const readyBtn = document.getElementById('ready-btn');
                readyBtn.textContent = currentUserReady ? 'Отменить готовность' : 'Я готов!';
                readyBtn.style.background = currentUserReady ? '#ff4466' : '#d122e3';
                readyBtn.style.color = currentUserReady ? '#fff' : '#000';

                // Показываем кнопку "Начать" только создателю
                const startBtn = document.getElementById('start-btn');
                const allReady = players.length >= 2 && players.every(p => p.is_ready);
                const isCreator = currentUserId === creatorId;

                startBtn.style.display = (isCreator && allReady) ? 'block' : 'none';

                // Обновляем видимость кнопки настроек
                const editBtn = document.getElementById('edit-settings-btn');
                if (editBtn) {
                    const canEdit = isCreator && players.length <= 1;
                    editBtn.style.display = canEdit ? 'inline-block' : 'none';
                }

                // Обновляем счётчик готовых
                const readyCount = players.filter(p => p.is_ready).length;
                const readyStatusEl = document.getElementById('ready-status');
                if (readyStatusEl) {
                    readyStatusEl.innerHTML = `<strong>Готовы:</strong> ${readyCount} / ${players.length}`;
                }

                // Обновляем заголовок комнаты с информацией о готовности
                const header = document.querySelector('#waiting-room-view .header h1');
                if (header) {
                    if (!header.dataset.original) {
                        header.dataset.original = header.textContent;
                    }
                    if (currentLobbyData && currentLobbyData.status === 'playing') {
                        header.textContent = '🎮 Игра запущена';
                    } else {
                        header.textContent = `${header.dataset.original} (${readyCount}/${players.length} готовы)`;
                    }
                }

                // Проверка: если текущего пользователя больше нет в лобби — выходим
                const stillInLobby = players.some(p => p.user_id === currentUserId);
                if (!stillInLobby) {
                    alert("Вы больше не находитесь в этом лобби.");
                    exitWaitingRoom();
                    return;
                }

            } catch (e) {
                console.error("Failed to load players", e);

                // Любая ошибка при загрузке игроков внутри лобби — безопасно выходим
                // (лобби могло быть удалено, пользователь кикнут, сеть упала и т.д.)
                const msg = (e?.message || '').toLowerCase();
                if (msg.includes('404') || msg.includes('not found') || msg.includes('not available') || msg.includes('failed')) {
                    alert("Лобби больше не доступно или вы были исключены.");
                    exitWaitingRoom();
                }
            }
        }

        let isTogglingReady = false;

        async function toggleReady() {
            if (!currentLobbyId || !currentUserId || isTogglingReady) return;

            isTogglingReady = true;
            const readyBtn = document.getElementById('ready-btn');
            const originalText = readyBtn.textContent;
            readyBtn.textContent = '...';
            readyBtn.disabled = true;

            try {
                // Получаем актуальное состояние
                const playersRes = await (window.apiFetch || fetch)(`/api/durak/lobbies/${currentLobbyId}/players`);
                const data = await playersRes.json();
                const me = data.players.find(p => p.user_id === currentUserId);
                const newReadyState = !me?.is_ready;

                const api = window.apiFetch || fetch;
                await api(`/api/durak/lobbies/${currentLobbyId}/ready`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        is_ready: newReadyState
                    })
                });

                await loadPlayers();

                const statusText = newReadyState ? 'Вы готовы' : 'Вы сняли готовность';
                showLobbyNotification(statusText, newReadyState ? 'success' : 'info');
            } catch (e) {
                alert("Не удалось изменить статус готовности");
            } finally {
                isTogglingReady = false;
                if (readyBtn) {
                    readyBtn.disabled = false;
                }
            }
        }

        async function leaveCurrentLobby() {
            if (!currentLobbyId || !currentUserId) return;

            const bet = currentLobbyData?.bet_amount || 0;
            const pot = currentLobbyData?.pot || 0;

            if (bet > 0) {
                const confirmLeave = confirm(
                    `В этом лобби ставка ${bet * 10} choin.\n\n` +
                    `Игра ещё не началась — ставка вернётся на твой кошелёк.\n\n` +
                    `Выйти из лобби?`
                );
                if (!confirmLeave) return;
            } else {
                // Обычное подтверждение для без-ставочных лобби
                if (!confirm("Ты уверены, что хочешь выйти из лобби?")) {
                    return;
                }
            }

            try {
                const api = window.apiFetch || fetch;
                await api(`/api/durak/lobbies/${currentLobbyId}/leave`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId })
                });
            } catch (e) {
                console.error("Leave error", e);
            }

            // Показываем уведомление, если была ставка
            if (bet > 0) {
                alert(`Ставка ${bet * 10} choin возвращена на кошелёк.`);
            }

            exitWaitingRoom();
        }

        // === Blacklist для названий лобби (клиент) ===
        const FORBIDDEN_LOBBY_WORDS = [
            "хуй", "хуи", "хуя", "хер", "пизд", "ебал", "ебан", "бля", "сук", "мудак",
            "дроч", "пидор", "педик", "fuck", "shit", "cunt", "dick"
        ];

        function containsForbiddenWords(text) {
            if (!text) return false;
            const lower = text.toLowerCase();
            return FORBIDDEN_LOBBY_WORDS.some(word => lower.includes(word));
        }

        /**
         * Приглашение в текущее лобби через стандартный шэринг Telegram
         */
        async function inviteToCurrentLobby() {
            if (!currentLobbyId || !currentLobbyData) {
                alert("Сначала зайдите в лобби");
                return;
            }

            const tg = window.Telegram?.WebApp;
            if (!tg) {
                alert("Эта функция доступна только внутри Telegram");
                return;
            }

            const lobbyName = lobby.name || `Лобби #${currentLobbyId}`;

            // Получаем актуальный юзернейм бота с сервера (чтобы всегда совпадал с BOT_USERNAME в env)
            let botUsername = "chingamebot";
            try {
                if (!window.__durakBotUsername) {
                    const api = window.apiFetch || fetch;
                    const res = await api('/api/bot-username');
                    if (res.ok) {
                        const data = await res.json();
                        window.__durakBotUsername = data.username || "chingamebot";
                    }
                }
                botUsername = window.__durakBotUsername || "chingamebot";
            } catch (e) {
                console.warn('Failed to fetch bot username, using fallback', e);
            }

            const link = `https://t.me/${botUsername}?startapp=durak_lobby_${currentLobbyId}`;

            // Собираем красивый текст приглашения с полной информацией
            let text = `🎮 Присоединяйся в лобби "${lobbyName}"!\n\n`;
            text += `👥 Игроков: ${lobby.current_players || 1}/${lobby.max_players}\n`;
            if (lobby.bet_amount > 0) {
                text += `Ставка: ${lobby.bet_amount * 10} choin\n`;
            }
            text += `🃏 ${lobby.deck_size} карт • ${lobby.game_type === 'podkidnoy' ? 'Подкидной' : 'Переводной'}\n\n`;
            text += `Нажимай кнопку ниже, чтобы зайти прямо в лобби!`;

            try {

                    tg.shareUrl(link, text);

                    const shareLink = `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`;
                    tg.openTelegramLink(shareLink);
                }
            } catch (e) {
                console.error(e);
                window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`, '_blank');
            }
        }

        /**
         * Красивое модальное подтверждение вместо нативного confirm()
         * Возвращает Promise<boolean>
         */
        function showCustomConfirm(title, message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                const titleEl = document.getElementById('confirm-title');
                const messageEl = document.getElementById('confirm-message');
                const cancelBtn = document.getElementById('confirm-cancel-btn');
                const okBtn = document.getElementById('confirm-ok-btn');

                if (!modal || !titleEl || !messageEl || !cancelBtn || !okBtn) {
                    // Fallback на нативный confirm если модал не найден
                    resolve(confirm(message));
                    return;
                }

                titleEl.textContent = title;
                messageEl.textContent = message;

                // Показываем модал
                modal.style.display = 'flex';

                // Удаляем старые обработчики (на всякий случай)
                const newCancel = cancelBtn.cloneNode(true);
                const newOk = okBtn.cloneNode(true);
                cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
                okBtn.parentNode.replaceChild(newOk, okBtn);

                const cleanup = () => {
                    modal.style.display = 'none';
                    newCancel.onclick = null;
                    newOk.onclick = null;
                };

                newCancel.onclick = () => {
                    cleanup();
                    resolve(false);
                };

                newOk.onclick = () => {
                    cleanup();
                    resolve(true);
                };

                // Закрытие по клику на фон
                modal.onclick = (e) => {
                    if (e.target === modal) {
                        cleanup();
                        resolve(false);
                    }
                };
            });
        }

        function exitWaitingRoom() {
            if (playersRefreshInterval) {
                clearInterval(playersRefreshInterval);
                playersRefreshInterval = null;
            }

            // Отключаем WebSocket, если он был
            if (durakSocket) {
                durakSocket.disconnect();
                durakSocket = null;
            }

            currentLobbyId = null;
            currentLobbyData = null;
            isPerformingDurakAction = false;

            // Выход из комнаты = возврат в меню (список лобби живёт в durak.html)
            window.location.href = 'durak.html';
        }

        async function startGame() {
            if (!currentLobbyId || !currentUserId) return;

            const confirmed = await showCustomConfirm(
                "Запуск игры",
                "Все игроки готовы. Начать партию в Дурака?"
            );

            if (!confirmed) {
                return;
            }

            const startBtn = document.getElementById('start-btn');
            const originalText = startBtn.textContent;
            startBtn.textContent = '...';
            startBtn.disabled = true;

            try {
                const api = window.apiFetch || fetch;
                const res = await api(`/api/durak/lobbies/${currentLobbyId}/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Не удалось запустить игру');
                }

                // После успешного старта сразу обновляем состояние и останавливаем polling
                if (playersRefreshInterval) {
                    clearInterval(playersRefreshInterval);
                    playersRefreshInterval = null;
                }

                await loadLobbyInfo();
                await loadPlayers();
                showLobbyNotification('Игра успешно запущена!', 'success');

            } catch (e) {
                alert("Ошибка запуска: " + e.message);
            } finally {
                if (startBtn) {
                    startBtn.textContent = originalText;
                    startBtn.disabled = false;
                }
            }
        }

        // ============================================================
        // DurakSocket — клиент для реального WebSocket
        // ============================================================
        class DurakSocket {
            constructor(lobbyId, userId) {
                this.lobbyId = lobbyId;
                this.userId = userId;
                this.socket = null;
                this.handlers = {};
                this.connected = false;
            }

            connect() {
                console.log(`[DurakSocket] Подключение к лобби #${this.lobbyId} (реальный WS)`);

                const protocol = (window.location.protocol === 'https:') ? 'wss:' : 'ws:';
                const host = window.location.host || 'localhost:8000';
                const tgInit = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) || '';
                let wsUrl = `${protocol}//${host}/api/durak/ws/${this.lobbyId}?user_id=${this.userId}`;
                if (tgInit) wsUrl += `&init_data=${encodeURIComponent(tgInit)}`;

                try {
                    this.socket = new WebSocket(wsUrl);

                    this.socket.onopen = () => {
                        console.log('[DurakSocket] WebSocket connected');
                        this.connected = true;
                        this._trigger('connected', { lobbyId: this.lobbyId });
                    };

                    this.socket.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            const eventType = msg.type || msg.event;
                            if (eventType) {
                                this._trigger(eventType, msg);
                            }
                        } catch (e) {
                            console.warn('[DurakSocket] Failed to parse WS message', e);
                        }
                    };

                    this.socket.onclose = () => {
                        console.log('[DurakSocket] WebSocket closed');
                        this.connected = false;
                        this._trigger('disconnected');
                    };

                    this.socket.onerror = (err) => {
                        console.error('[DurakSocket] WebSocket error', err);
                        this.connected = false;
                    };
                } catch (e) {
                    console.error('[DurakSocket] Failed to create WebSocket', e);
                    this.connected = true;
                    setTimeout(() => {
                        this._trigger('connected', { lobbyId: this.lobbyId });
                    }, 200);
                }
            }

            disconnect() {
                if (this.socket) {
                    this.socket.close();
                }
                this.connected = false;
                this._trigger('disconnected');
            }

            send(action, data = {}) {
                const payload = {
                    action,
                    lobby_id: this.lobbyId,
                    user_id: this.userId,
                    data
                };

                if (this.socket && this.socket.readyState === WebSocket.OPEN) {
                    this.socket.send(JSON.stringify(payload));
                } else {
                    if (!this.connected) {
                        console.warn('[DurakSocket] Попытка отправить без подключения');
                    }
                }
            }

            on(event, callback) {
                if (!this.handlers[event]) {
                    this.handlers[event] = [];
                }
                this.handlers[event].push(callback);
            }

            off(event, callback) {
                if (!this.handlers[event]) return;
                this.handlers[event] = this.handlers[event].filter(cb => cb !== callback);
            }

            _trigger(event, data = {}) {
                if (this.handlers[event]) {
                    this.handlers[event].forEach(cb => {
                        try {
                            cb(data);
                        } catch (err) {
                            console.error(`[DurakSocket] Ошибка в обработчике события "${event}"`, err);
                        }
                    });
                }
            }
        }

        // ============================================================
        // КОНТРАКТ СОБЫТИЙ (Event Contract)
        // ============================================================
        // Клиент → Сервер (через durakSocket.send):
        //   - 'ready'                 { user_id, is_ready }
        //   - 'game_action'           { user_id, action, payload }
        //   - 'leave'                 { user_id }
        //
        // Сервер → Клиент (приходит через WS onmessage):
        //   - 'connected'             {}
        //   - 'disconnected'          {}
        //   - 'lobby_updated'         { ... }
        //   - 'player_joined'         { user_id, first_name, is_ready, ... }
        //   - 'player_left'           { user_id, first_name }
        //   - 'player_ready_changed'  { user_id, is_ready }
        //   - 'game_started'          { started_by, timestamp, initial_state? }
        //   - 'game_action'           { user_id, action, payload, ... }
        //   - 'game_ended'            { winner_id, final_state, payouts? }
        //
        // Реальный WebSocket: /api/durak/ws/{lobby_id}
        // ============================================================

        const DURAK_EVENTS = {
            CONNECTED: 'connected',
            DISCONNECTED: 'disconnected',
            LOBBY_UPDATED: 'lobby_updated',
            PLAYER_JOINED: 'player_joined',
            PLAYER_LEFT: 'player_left',
            PLAYER_READY_CHANGED: 'player_ready_changed',
            GAME_STARTED: 'game_started',
            GAME_ACTION: 'game_action',
            GAME_ENDED: 'game_ended',
        };

        // Глобальная переменная для сокета текущего лобби
        let durakSocket = null;

        /**
         * Настраивает подписки на события сокета для текущего лобби.
         * Вызывается один раз при создании сокета.
         */
        function setupDurakSocketListeners() {
            if (!durakSocket) return;

            // События теперь реально драйвят UI (для симуляции и будущих WS)
            durakSocket.on('player_ready_changed', (data) => {
                console.log('[Durak] Получено событие player_ready_changed', data);
                loadPlayers();
            });

            durakSocket.on('lobby_updated', (data) => {
                console.log('[Durak] Получено событие lobby_updated', data);

                // Пытаемся определить смену владельца
                if (data?.new_owner_name || data?.creator_id) {
                    const newOwner = data.new_owner_name || 'Новый владелец';
                    showLobbyNotification(`Владелец лобби изменился: ${newOwner}`, 'info');
                }

                loadLobbyInfo();
            });

            durakSocket.on('player_joined', (data) => {
                console.log('[Durak] Игрок зашёл в лобби', data);
                const name = data?.first_name || 'Игрок';
                showLobbyNotification(`${name} зашёл в лобби`, 'success');
                loadPlayers();
            });

            durakSocket.on('player_left', (data) => {
                console.log('[Durak] Игрок вышел из лобби', data);
                const name = data?.first_name || 'Игрок';
                showLobbyNotification(`${name} вышел из лобби`, 'warning');
                loadPlayers();
            });

            // Игра стартовала — переходим на чистый игровой экран (полный экран, отдельная страница)
            durakSocket.on('game_started', (data) => {
                console.log('[Durak] Игра запущена (socket)!', data);
                showLobbyNotification('Игра официально началась!', 'success');
                // Редирект на durak-game.html (полноэкранное поле без хрома)
                setTimeout(() => {
                    if (currentLobbyId) {
                        window.location.href = `durak-game.html?lobby=${currentLobbyId}`;
                    }
                }, 400);
            });

            // Пример обработки игрового действия (просто логируем)
            durakSocket.on('game_action', (data) => {
                console.log('[Durak] Получено игровое действие по WS', data);
                // Реальное обновление состояния без лишнего polling
                if (data && data.state) {
                    currentGameState = data.state;
                    if (typeof renderDurakBoard === 'function') {
                        renderDurakBoard(data.state);
                    }
                } else if (currentLobbyId) {
                    // fallback
                    if (typeof fetchAndRenderDurakState === 'function') fetchAndRenderDurakState();
                }
            });

            durakSocket.on('game_ended', (data) => {
                console.log('[Durak] Игра завершена по WS', data);
                showLobbyNotification(`Игра окончена! Победитель: ${data.winner_id || 'неизвестно'}`, 'success');
                // Возврат в лобби/список (полный цикл обрабатывается на game странице)
                setTimeout(() => {
                    if (currentLobbyId) {
                        window.location.href = `durak-room.html?lobby=${currentLobbyId}`;
                    } else {
                        window.location.reload();
                    }
                }, 1500);
            });
        }

        /**
         * Показывает красивое уведомление внутри лобби.
         * Используется для player_joined, player_left, owner change и т.д.
         */
        function showLobbyNotification(message, type = 'info') {
            const container = document.getElementById('lobby-notifications');
            if (!container) return;

            const colors = {
                info: '#3a7ca5',
                success: '#2e7d32',
                warning: '#c17d00',
                error: '#c62828'
            };

            const div = document.createElement('div');
            div.style.cssText = `
                background: ${colors[type] || colors.info}22;
                border: 1px solid ${colors[type] || colors.info};
                color: #ddd;
                padding: 8px 12px;
                border-radius: 8px;
                font-size: 0.9rem;
                margin-bottom: 6px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                animation: fadeIn 0.2s ease;
            `;
            div.innerHTML = `
                <span>${message}</span>
                <span onclick="this.parentElement.remove()" style="cursor:pointer; opacity:0.6; font-size:1.1rem; line-height:1;">×</span>
            `;

            container.appendChild(div);

            // Авто-удаление через 6 секунд
            setTimeout(() => {
                if (div.parentNode) div.parentNode.removeChild(div);
            }, 6000);
        }

        // === Редактирование настроек лобби (только для создателя) ===

        function openEditSettingsModal() {
            if (!currentLobbyData || !currentLobbyId) return;

            // Заполняем текущими значениями
            document.getElementById('edit-max-players').value = currentLobbyData.max_players || 4;
            document.getElementById('edit-deck-size').value = currentLobbyData.deck_size || 36;
            document.getElementById('edit-bet-amount').value = (currentLobbyData.bet_amount || 0) * 10;

            document.getElementById('edit-settings-modal').style.display = 'flex';
        }

        function closeEditSettingsModal() {
            document.getElementById('edit-settings-modal').style.display = 'none';
        }

        async function saveLobbySettings() {
            if (!currentLobbyId || !currentUserId) return;

            const updatedSettings = {
                user_id: currentUserId,
                max_players: parseInt(document.getElementById('edit-max-players').value),
                deck_size: parseInt(document.getElementById('edit-deck-size').value),
                bet_amount: Math.floor((parseInt(document.getElementById('edit-bet-amount').value) || 0) / 10)
            };

            try {
                const api = window.apiFetch || fetch;
                const res = await api(`/api/durak/lobbies/${currentLobbyId}/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedSettings)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Не удалось сохранить настройки');
                }

                closeEditSettingsModal();
                alert('Настройки обновлены');

                // Обновляем данные лобби и игроков
                await loadLobbyInfo();
                await loadPlayers();

            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        // ============================================================
        // DURAK GAME CLIENT (реальная интеграция с /state и /action)
        // ============================================================
        let currentGameState = null;
        let durakGamePollingInterval = null;
        let selectedBeatAttackCard = null;   // для двухшагового отбива (fallback)
        let currentLegalBeats = [];          // от сервера: [{attack: "...", beat: "..."}, ...] для текущего viewer'а
        let isPerformingDurakAction = false; // защита от одновременных действий и лишних рендеров

        function stopDurakGamePolling() {
            if (durakGamePollingInterval) {
                clearInterval(durakGamePollingInterval);
                durakGamePollingInterval = null;
            }
            isPerformingDurakAction = false;
        }

        

        // ================== ИНИЦИАЛИЗАЦИЯ ==================

        document.addEventListener('DOMContentLoaded', () => {
            const user = tg.initDataUnsafe?.user;
            if (user) currentUserId = user.id;

            // Предзагружаем юзернейм бота для пригласительных ссылок
            (window.apiFetch || fetch)('/api/bot-username')
                .then(r => r.ok ? r.json() : null)
                .then(d => { if (d && d.username) window.__durakBotUsername = d.username; })
                .catch(() => {});

            // Эта страница = конкретная комната. ID берём из URL (?lobby=ID).
            const params = new URLSearchParams(window.location.search);
            const urlLobbyId = parseInt(params.get('lobby') || params.get('lobby_id') || '0', 10);

            if (urlLobbyId) {
                enterWaitingRoom(urlLobbyId);
            } else {
                // Без ID комнаты делать нечего — уходим в меню (список лобби)
                window.location.href = 'durak.html';
            }
        });
    </script>
