<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Master | Chin Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../js/api.js"></script>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/game-page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           МАКСИМАЛЬНО ЖЁСТКАЯ ЗАЩИТА TOUCH-ВЗАИМОДЕЙСТВИЯ
           ============================================ */
        * {
            user-select: none !important;
            -webkit-user-select: none !important;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            box-sizing: border-box;
        }

        html, body {
            overscroll-behavior: none !important;
            touch-action: none !important;
            overflow: hidden !important;
            height: 100% !important;
            position: fixed !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }



        :root {
            --neon-blue: #ff66c9;
            --neon-pink: #bc13fe;
            --neon-purple: #7a04eb;
            --bg-dark: #1a103d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(180deg, #0d081a 0%, #120b2e 35%, #1a103d 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Анимированный фон (Сетка + Градиент) */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(188, 19, 254, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite; will-change: transform;
            z-index: -2;
            opacity: 0.6;
        }

        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 150vw; height: 150vw;
            background: radial-gradient(circle, rgba(122,4,235,0.3) 0%, rgba(42,16,80,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Кнопка Назад */
        .back-btn {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: all 0.2s;
            z-index: 100;
            text-decoration: none;
        }
        .back-btn:active { transform: scale(0.9); background: var(--neon-blue); color: #000; }

        /* Контейнер игры */
        .game-container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Allow scrolling the start menu (incl. full leaderboard) like in Flappy Chin */
        #start-screen.game-container {
            max-height:calc(100vh - 70px - env(safe-area-inset-bottom, 0px));
            overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y!important;
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
        }

        .stat-box {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 5px var(--neon-purple);
        }

        .score-val { color: var(--neon-blue); }
        .time-val { color: var(--neon-pink); }

        .problem-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            margin: 30px 0;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-blue);
            min-height: 70px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-blue);
            color: #fff;
            padding: 20px;
            font-size: 24px;
            font-family: 'Orbitron', sans-serif;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .option-btn:active {
            transform: scale(0.95);
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* Экраны */
        .screen { display: none; }
        .screen.active { display: block; }

        .start-btn, .restart-btn {
            width: 100%;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            transition: transform 0.2s;
            margin-top: 20px;
        }
        .start-btn:active, .restart-btn:active { transform: scale(0.95); }

        .level-indicator {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .game-container { margin-bottom: calc(70px + env(safe-area-inset-bottom, 0px)) !important; }
        @media (prefers-reduced-motion: reduce) {
            .bg-grid, .bg-stars, h1.glitch::before, h1.glitch::after { animation: none !important; }
        }

    </style>
</head>
<body>

    <!-- Фон -->
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- Экран приветствия -->
    <div id="start-screen" class="screen active game-container">
        <div class="game-header">
            <h1>MATH MASTER</h1>
            <p>Решай примеры, набирай очки и ставь рекорды!</p>
        </div>
        <div class="game-icon-box"><img src="../icons/math.webp" alt="Math Master"></div>

        <button id="math-start-btn" class="start-btn" onclick="tryStartGame()">НАЧАТЬ ИГРУ</button>
        
        <!-- ⚡ Energy widget -->
        <div id="energy-container" style="display:flex; justify-content:center; margin-top:14px;"></div>
        
        <!-- ТОП-10 на главном экране игры -->
        <div class="leaderboard-mini">
            <h3><img src="../icons/cup.webp" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;"> ТОП-10 ИГРОКОВ</h3>
            <table class="leaderboard-list" style="width:100%; font-size: 0.95rem;">
                <tbody id="mini-lb-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Экран игры -->
    <div id="game-screen" class="screen game-container">
        <div class="stats-row">
            <div class="stat-box">Очки: <span id="score" class="score-val">0</span></div>
            <div class="stat-box">Время: <span id="time" class="time-val">30</span></div>
        </div>
        
        <div class="problem-box" id="problem">2 + 2 = ?</div>
        
        <div class="options-grid" id="options">
            <!-- Кнопки генерируются JS -->
        </div>

        <div class="level-indicator">Уровень сложности: <span id="level">1</span></div>
    </div>

    <!-- Экран конца игры -->
    <div id="end-screen" class="screen game-container">
        <h1 style="color: var(--neon-pink)">ВРЕМЯ ВЫШЛО!</h1>
        <p style="font-size: 18px;">Твой результат:</p>
        <div style="font-size: 60px; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin: 20px 0;">
            <span id="final-score">0</span>
        </div>
        <button class="restart-btn js-continue" onclick="continueGame()" style="background:linear-gradient(135deg,#ffd700,#ff9500);color:#1a1a1a;">Продолжить · 100 <img src="../icons/choin.webp" alt="" style="width:1em;height:1em;object-fit:contain;vertical-align:-2px;"></button>
        <button id="math-restart-btn" class="restart-btn" onclick="tryStartGame()" style="margin-top:10px;">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        // Полный экран только на телефоне
        if (typeof window.initTelegramFullscreen === 'function') {
          window.initTelegramFullscreen();
        } else {
          tg.expand();
        }
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        tg.enableClosingConfirmation();

        // ── Проверка бана + запуск периодической проверки ──
        if (window.enforceBanIfNeeded) {
            window.enforceBanIfNeeded();
        }
        if (window.startBanWatcher) {
            window.startBanWatcher(45000);
        }

        // ====== ГЛОБАЛЬНАЯ ЗАЩИТА ======
        // Полностью блокируем скролл и свайпы на уровне документа.
        // Mini App закрывается ТОЛЬКО кнопкой закрыть.
        document.documentElement.style.overscrollBehavior = 'none';
        document.body.style.overscrollBehavior = 'none';
        document.body.style.touchAction = 'none';
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.width = '100%';
        document.body.style.height = '100%';

        // ─── Отступ сверху под шапку Telegram ───────────────
        function applyTopPadding() {
            const tgTop  = tg.contentSafeAreaInsets?.top ?? 0;
            const sysTop = tg.safeAreaInsets?.top ?? 0;
            const topPad = Math.max(tgTop, sysTop);
            document.body.style.paddingTop = topPad + 'px';
        }
        applyTopPadding();
        tg.onEvent('viewportChanged', applyTopPadding);
        tg.onEvent('safeAreaChanged', applyTopPadding);
        tg.onEvent('contentSafeAreaChanged', applyTopPadding);

        // === Кнопка "Назад" в шапке Telegram (как в лобби Дурака) ===
        if (tg.BackButton) {
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                if (tg.BackButton) tg.BackButton.hide();
                window.location.href = '../index.html';
            });
        }

        document.addEventListener('touchmove', e => {
            // Allow scrolling inside the start menu / leaderboard (like Flappy Chin)
            const startScreen = document.getElementById('start-screen');
            if (startScreen && startScreen.contains(e.target)) {
                return;
            }
            e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        let score = 0;
        let timeLeft = 30;
        let timerInterval;
        let currentLevel = 1;
        let correctAnswer;
        let history = [];

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('time').innerText = timeLeft;
            document.getElementById('level').innerText = currentLevel;
        }

        function generateProblem() {
            const newLevel = Math.floor(score / 4) + 1;   // быстрее рост сложности (было /5)
            if (newLevel > currentLevel) currentLevel = newLevel;
            document.getElementById('level').innerText = currentLevel;

            const ops = ['+', '-', '*'];
            let opWeights = [0.4, 0.4, 0.2]; 
            if (currentLevel > 3) opWeights = [0.3, 0.3, 0.4];
            if (currentLevel > 6) opWeights = [0.2, 0.2, 0.6];

            const rand = Math.random();
            let op = '+';
            if (rand > opWeights[0] + opWeights[1]) op = '*';
            else if (rand > opWeights[0]) op = '-';

            let maxNum = 10 + (currentLevel * 3);          // числа растут быстрее (было *2)
            let a = Math.floor(Math.random() * maxNum) + 1;
            let b = Math.floor(Math.random() * maxNum) + 1;

            if (op === '*') {
                a = Math.floor(Math.random() * (4 + currentLevel * 2)) + 2;
                b = Math.floor(Math.random() * (4 + currentLevel * 2)) + 2;
                if (currentLevel > 5) { a *= 2; b = Math.floor(Math.random() * (4 + currentLevel)) + 2; }
            }
            if (op === '-') {
                if (a < b) [a, b] = [b, a];
            }

            correctAnswer = eval(`${a} ${op} ${b}`);
            const problemStr = `${a} ${op} ${b}`;

            if (history.includes(problemStr)) {
                generateProblem();
                return;
            }
            history.push(problemStr);
            if (history.length > 10) history.shift();

            document.getElementById('problem').innerText = `${problemStr} = ?`;

            let answers = new Set();
            answers.add(correctAnswer);
            
            // Неверные варианты масштабируем под величину ответа — на больших числах
            // «±5» делало их слишком очевидными
            const span = Math.max(4, Math.round(Math.abs(correctAnswer) * 0.2));
            while (answers.size < 4) {
                let offset = Math.floor(Math.random() * (span * 2 + 1)) - span;
                if (offset === 0) offset = span;
                let fake = correctAnswer + offset;
                if (fake >= 0 && fake !== correctAnswer) answers.add(fake);
            }

            const optionsDiv = document.getElementById('options');
            const shuffled = Array.from(answers).sort(() => Math.random() - 0.5);

            // Обновляем существующие кнопки вместо пересоздания DOM —
            // так не бывает лага между ответом и появлением новых кнопок
            const existingBtns = optionsDiv.querySelectorAll('.option-btn');
            if (existingBtns.length === 4) {
                existingBtns.forEach((btn, i) => {
                    btn.innerText = shuffled[i];
                    btn.onclick = () => checkAnswer(shuffled[i]);
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                });
            } else {
                optionsDiv.innerHTML = '';
                shuffled.forEach(ans => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = ans;
                    btn.onclick = () => checkAnswer(ans);
                    optionsDiv.appendChild(btn);
                });
            }
        }

        // Минимальный cooldown 80ms — защита от двойного клика,
        // но не мешает быстрым игрокам (реакция человека ~150ms+)
        // Вспышка экрана (поверх всего, т.к. фон-сетка перекрывает тень body)
        const _flashEl = document.createElement('div');
        _flashEl.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:0;transition:opacity .12s ease;';
        document.body.appendChild(_flashEl);
        function flashScreen(color) {
            _flashEl.style.boxShadow = 'inset 0 0 60px ' + color;
            _flashEl.style.opacity = '1';
            setTimeout(() => { _flashEl.style.opacity = '0'; }, 150);
        }

        let lastAnswerTime = 0;

        function checkAnswer(ans) {
            const now = Date.now();
            if (now - lastAnswerTime < 80) return;
            lastAnswerTime = now;

            if (ans === correctAnswer) {
                score++;
                timeLeft += 1;   // меньше «докрутки» времени — игра не тянется бесконечно (было +2)
                if (navigator.vibrate) navigator.vibrate(50);
                flashScreen('#00ff00');
            } else {
                timeLeft -= 5;
                if (navigator.vibrate) navigator.vibrate(200);
                flashScreen('#ff0000');
            }
            updateUI();
            generateProblem();
        }

        async function loadMiniLeaderboard() {
            try {
                const api = window.apiFetch || fetch;
                const response = await api('/api/leaderboard/math');
                const data = await response.json();
                const tbody = document.getElementById('mini-lb-body');
                tbody.innerHTML = '';

                if (data.leaders && data.leaders.length > 0) {
                    data.leaders.forEach((player, index) => {
                        const rankClass = index < 3 ? `rank-${index + 1}` : '';
                        tbody.innerHTML += `
                            <tr class="${rankClass}">
                                <td>${index + 1}</td>
                                <td>${player.first_name}</td>
                                <td style="text-align:right; font-weight:bold; color:var(--neon-blue);">${player.score}</td>
                            </tr>`;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">Пока нет рекордов</td></tr>`;
                }
            } catch (e) {
                console.error("Не удалось загрузить топ", e);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            if (window.Energy) Energy.endSession();
            document.getElementById('final-score').innerText = score;
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('end-screen').classList.add('active');
            
            const user = tg.initDataUnsafe?.user;
            if (user && score > 0) {
                const api = window.apiFetch || fetch;
                api('/api/save_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        first_name: user.first_name || user.username || "Игрок",
                        game: 'math',
                        token: window.GameGuard?.token,
                        score: score
                    })
                }).then(() => loadMiniLeaderboard())
                  .catch(err => {
                      console.error('Save error:', err);
                      loadMiniLeaderboard();
                  });
            } else {
                loadMiniLeaderboard();
            }
        }

        // Продолжить за 10⭐ — счёт/уровень сохраняются, добавляем время
        function continueGame() {
            window.continueForStars(() => {
                timeLeft = 20;
                updateUI();
                document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
                document.getElementById('game-screen').classList.add('active');
                generateProblem();
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('time').innerText = timeLeft;
                    if (timeLeft <= 0) endGame();
                }, 1000);
            });
        }
        window.continueGame = continueGame;

        function startGame() {
            if (window.GameGuard) GameGuard.start('math');
            score = 0;
            timeLeft = 30;
            currentLevel = 1;
            history = [];
            updateUI();
            
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
            
            generateProblem();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        // Загрузка топа при открытии страницы
        window.onload = loadMiniLeaderboard;
    </script>
    <!-- ========== BOTTOM NAVBAR ========== -->
    <div id="chin-navbar-mount"></div>
    <script src="../js/navbar.js"></script>

    <script src="../energy.js"></script>
    <script>
        // ⚡ Math Master стоит 1 энергию за игру
        const MATH_ENERGY_COST = 10;
        const trySpend = Energy.init(MATH_ENERGY_COST, 'math-start-btn', 'energy-container');

        function tryStartGame() {
            if (trySpend()) {
                startGame();
            }
        }
    </script>
</body>
</html>
