<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048 | Chin Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../js/api.js"></script>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/game-page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           МАКСИМАЛЬНО ЖЁСТКАЯ ЗАЩИТА TOUCH-ВЗАИМОДЕЙСТВИЯ
           ============================================ */
        * {
            user-select: none !important;
            -webkit-user-select: none !important;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            box-sizing: border-box;
        }

        html, body {
            overscroll-behavior: none !important;
            touch-action: none !important;
            overflow: hidden !important;
            height: 100% !important;
            position: fixed !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Игровое поле — свайпы разрешены, скролл страницы заблокирован */
        .game-board {
            touch-action: none !important;
            overscroll-behavior: none !important;
        }

        :root {
            --neon-blue: #ff66c9;
            --neon-pink: #bc13fe;
            --neon-purple: #7a04eb;
            --bg-dark: #1a103d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(180deg, #0d081a 0%, #120b2e 35%, #1a103d 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Анимированный фон */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(188, 19, 254, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite; will-change: transform;
            z-index: -2;
            opacity: 0.6;
        }

        .bg-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 150vw; height: 150vw;
            background: radial-gradient(circle, rgba(122,4,235,0.3) 0%, rgba(42,16,80,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Кнопка Назад */
        .back-btn {
            position: absolute;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: all 0.2s;
            z-index: 100;
            text-decoration: none;
        }
        .back-btn:active { transform: scale(0.9); background: var(--neon-blue); color: #000; }

        /* Контейнер игры */
        .game-container {
            text-align: center;
            width: 95%;
            max-width: 400px;
            padding: 15px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes tileAppear {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
        @keyframes tileMerge {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Allow scrolling the start menu (incl. full leaderboard) like in Flappy Chin */
        #start-screen.game-container {
            max-height:calc(100vh - 70px - env(safe-area-inset-bottom, 0px));
            overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y!important;
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
        }

        .stat-box {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 5px var(--neon-purple);
        }

        .score-val { color: var(--neon-blue); }

        /* Игровое поле */
        .game-board {
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            padding: 10px;
            margin: 15px 0;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(122, 4, 235, 0.3);
        }

        /* Статичная подложка-сетка (пустые слоты) — задаёт размер поля */
        .board-bg {
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .cell-bg {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }

        /* Слой анимированных плиток поверх подложки */
        .tile-layer {
            position: absolute;
            inset: 0;
            --cell: calc((100% - 3 * 8px) / 4);
        }
        .tile {
            position: absolute;
            width: var(--cell);
            height: var(--cell);
            left: 0; top: 0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: bold;
            will-change: left, top;
            transition: left 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        top 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Цвета плиток */
        .tile[data-value="2"] { background: linear-gradient(135deg, #ff8ad6, #a347f8); box-shadow: 0 0 10px #ff66c9; }
        .tile[data-value="4"] { background: linear-gradient(135deg, #bc13fe, #7a04eb); box-shadow: 0 0 10px #bc13fe; }
        .tile[data-value="8"] { background: linear-gradient(135deg, #ff6b6b, #ff0000); box-shadow: 0 0 10px #ff6b6b; }
        .tile[data-value="16"] { background: linear-gradient(135deg, #ffd93d, #ff9500); box-shadow: 0 0 10px #ffd93d; }
        .tile[data-value="32"] { background: linear-gradient(135deg, #6bcb77, #00aa00); box-shadow: 0 0 10px #6bcb77; }
        .tile[data-value="64"] { background: linear-gradient(135deg, #4d96ff, #0066cc); box-shadow: 0 0 15px #4d96ff; }
        .tile[data-value="128"] { background: linear-gradient(135deg, #ff6b9d, #ff0066); box-shadow: 0 0 20px #ff6b9d; font-size: 18px; }
        .tile[data-value="256"] { background: linear-gradient(135deg, #c9b1ff, #9966ff); box-shadow: 0 0 20px #c9b1ff; font-size: 18px; }
        .tile[data-value="512"] { background: linear-gradient(135deg, #ff66c9, #7a04eb); box-shadow: 0 0 25px #ff66c9; font-size: 18px; }
        .tile[data-value="1024"] { background: linear-gradient(135deg, #bc13fe, #9900ff); box-shadow: 0 0 25px #bc13fe; font-size: 16px; }
        .tile[data-value="2048"] { background: linear-gradient(135deg, #ffd700, #ffaa00); box-shadow: 0 0 30px #ffd700; font-size: 16px; }
        .tile[data-value="4096"] { background: linear-gradient(135deg, #ffffff, #cccccc); box-shadow: 0 0 35px #ffffff; font-size: 16px; }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 200px;
            margin: 15px auto;
        }

        .control-btn {
            background: rgba(0, 243, 255, 0.1);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: var(--neon-blue);
            color: #000;
            transform: scale(0.95);
        }

        .control-btn.empty { visibility: hidden; }

        /* Экраны */
        .screen { display: none; }
        .screen.active { display: block; }

        .start-btn, .restart-btn {
            width: 100%;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            transition: transform 0.2s;
            margin-top: 15px;
        }
        .start-btn:active, .restart-btn:active { transform: scale(0.95); }

        .message {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
        }

        .game-container { margin-bottom: calc(70px + env(safe-area-inset-bottom, 0px)) !important; }
        @media (prefers-reduced-motion: reduce) {
            .bg-grid, .bg-stars, h1.glitch::before, h1.glitch::after { animation: none !important; }
        }

    </style>
</head>
<body>

    <!-- Фон -->
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- Экраны -->
    <div id="start-screen" class="screen active game-container">
        <div class="game-header">
            <h1>2048</h1>
            <p>Складывай плитки и достигни 2048!</p>
        </div>
        <div class="game-icon-box"><img src="../icons/2048.png" alt="2048"></div>

        <button id="game2048-start-btn" class="start-btn" onclick="tryStartGame()">НАЧАТЬ ИГРУ</button>
        
        <!-- ⚡ Energy widget -->
        <div id="energy-container" style="display:flex; justify-content:center; margin-top:14px;"></div>
        
        <div class="leaderboard-mini">
            <h3><img src="../icons/cup.webp" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;"> ТОП-10 ИГРОКОВ</h3>
            <table class="leaderboard-list" style="width:100%; font-size: 0.95rem;">
                <tbody id="mini-lb-body"></tbody>
            </table>
        </div>
    </div>

    <div id="game-screen" class="screen game-container">
        <div class="stats-row">
            <div class="stat-box">Очки: <span id="score" class="score-val">0</span></div>
            <div class="stat-box">Рекорд: <span id="best-score" class="score-val">0</span></div>
        </div>
        
        <div class="game-board" id="game-board"></div>

        <p class="message">Используй стрелки или свайпы!</p>
        
        <button class="restart-btn" onclick="tryStartGame()">ЗАНОВО</button>
    </div>

    <div id="end-screen" class="screen game-container">
        <h1 style="color: var(--neon-pink)">ИГРА ОКОНЧЕНА!</h1>
        <p style="font-size: 18px;">Твой результат:</p>
        <div style="font-size: 60px; font-weight: 900; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin: 20px 0;">
            <span id="final-score">0</span>
        </div>
        <button class="restart-btn js-continue" onclick="continueGame()" style="background:linear-gradient(135deg,#ffd700,#ff9500);color:#1a1a1a;">Продолжить · 100 choin</button>
        <button class="restart-btn" onclick="tryStartGame()" style="margin-top:10px;">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        // Полный экран только на телефоне
        if (typeof window.initTelegramFullscreen === 'function') {
          window.initTelegramFullscreen();
        } else {
          tg.expand();
        }
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        tg.enableClosingConfirmation();

        // ── Проверка бана + запуск периодической проверки ──
        if (window.enforceBanIfNeeded) {
            window.enforceBanIfNeeded();
        }
        if (window.startBanWatcher) {
            window.startBanWatcher(45000);
        }

        // ====== ГЛОБАЛЬНАЯ ЗАЩИТА ======
        // Полностью блокируем скролл/свайп на уровне документа.
        // Игровые свайпы читаются ОТДЕЛЬНО — на элементе game-board.
        document.documentElement.style.overscrollBehavior = 'none';
        document.body.style.overscrollBehavior = 'none';
        document.body.style.touchAction = 'none';
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.width = '100%';
        document.body.style.height = '100%';

        // ─── Отступ сверху под шапку Telegram ───────────────
        function applyTopPadding() {
            const tgTop  = tg.contentSafeAreaInsets?.top ?? 0;
            const sysTop = tg.safeAreaInsets?.top ?? 0;
            const topPad = Math.max(tgTop, sysTop);
            document.body.style.paddingTop = topPad + 'px';
        }
        applyTopPadding();
        tg.onEvent('viewportChanged', applyTopPadding);
        tg.onEvent('safeAreaChanged', applyTopPadding);
        tg.onEvent('contentSafeAreaChanged', applyTopPadding);

        // === Кнопка "Назад" в шапке Telegram (как в лобби Дурака) ===
        if (tg.BackButton) {
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                if (tg.BackButton) tg.BackButton.hide();
                window.location.href = '../index.html';
            });
        }

        // Блокируем любой touchmove на document — окно Mini App не закроется свайпом
        // Но разрешаем скролл в меню старта (для полного лидерборда, как во Flappy Chin)
        document.addEventListener('touchmove', e => {
            const startScreen = document.getElementById('start-screen');
            if (startScreen && startScreen.contains(e.target)) {
                return;
            }
            e.preventDefault();
        }, { passive: false });

        // Блокировка double-tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);
    
        // ===================== ИГРОВАЯ ЛОГИКА 2048 =====================
        let board = [];          // числовая модель — для checkGameOver
        let grid = [];           // grid[r][c] = tile | null  (идентичность плиток)
        let tiles = [];          // живые плитки-объекты
        let tileSeq = 0;
        let score = 0;
        let bestScore = 0;
        let gameOver = false;

        const TILE_GAP = 8;
        function cellOffset(i) { return `calc((var(--cell) + ${TILE_GAP}px) * ${i})`; }

        // Один раз строим подложку (16 слотов) + слой плиток внутри #game-board
        function ensureLayers() {
            const gb = document.getElementById('game-board');
            if (gb._built) return;
            gb._built = true;
            const bg = document.createElement('div');
            bg.className = 'board-bg';
            for (let i = 0; i < 16; i++) {
                const s = document.createElement('div');
                s.className = 'cell-bg';
                bg.appendChild(s);
            }
            const layer = document.createElement('div');
            layer.className = 'tile-layer';
            layer.id = 'tile-layer';
            bg.appendChild(layer);
            gb.appendChild(bg);
        }

        function positionTile(el, r, c) {
            el.style.left = cellOffset(c);
            el.style.top = cellOffset(r);
        }

        function makeTile(r, c, val, isNew) {
            const el = document.createElement('div');
            el.className = 'tile';
            el.dataset.value = val;
            el.textContent = val;
            positionTile(el, r, c);
            if (isNew) el.style.animation = 'tileAppear 0.18s ease forwards';
            document.getElementById('tile-layer').appendChild(el);
            const t = { id: ++tileSeq, r, c, val, el, merged: false };
            tiles.push(t);
            grid[r][c] = t;
            return t;
        }

        function syncBoard() {
            for (let r = 0; r < 4; r++)
                for (let c = 0; c < 4; c++)
                    board[r][c] = grid[r][c] ? grid[r][c].val : 0;
        }

        function initBoard() {
            ensureLayers();
            document.getElementById('tile-layer').innerHTML = '';
            tiles = [];
            tileSeq = 0;
            grid = Array(4).fill(null).map(() => Array(4).fill(null));
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            addNewTile();
            addNewTile();
            syncBoard();
            document.getElementById('score').textContent = score;
            document.getElementById('best-score').textContent = bestScore;
        }

        function addNewTile() {
            const empty = [];
            for (let r = 0; r < 4; r++)
                for (let c = 0; c < 4; c++)
                    if (!grid[r][c]) empty.push({ r, c });
            if (!empty.length) return null;
            const { r, c } = empty[Math.floor(Math.random() * empty.length)];
            makeTile(r, c, Math.random() < 0.9 ? 2 : 4, true);
            return { r, c };
        }
    
        function move(direction) {
            if (gameOver) return;

            const vec = { left: [0, -1], right: [0, 1], up: [-1, 0], down: [1, 0] }[direction];
            if (!vec) return;
            const [dr, dc] = vec;
            const base = [0, 1, 2, 3];
            const rOrder = dr > 0 ? [3, 2, 1, 0] : base;   // обрабатываем плитки от «стены»
            const cOrder = dc > 0 ? [3, 2, 1, 0] : base;

            tiles.forEach(t => { t.merged = false; });
            const absorbed = [];
            const mergedDest = [];
            let moved = false;

            for (const r of rOrder) {
                for (const c of cOrder) {
                    const tile = grid[r][c];
                    if (!tile) continue;
                    let nr = r, nc = c, handled = false;
                    while (true) {
                        const tr = nr + dr, tc = nc + dc;
                        if (tr < 0 || tr > 3 || tc < 0 || tc > 3) break;
                        const dest = grid[tr][tc];
                        if (!dest) { nr = tr; nc = tc; continue; }
                        // слияние двух одинаковых (каждая участвует в слиянии 1 раз за ход)
                        if (dest.val === tile.val && !dest.merged && !tile.merged) {
                            grid[r][c] = null;
                            tile.r = tr; tile.c = tc;        // поглощённая скользит на dest
                            dest.val *= 2; dest.merged = true;
                            score += dest.val;
                            absorbed.push(tile);
                            mergedDest.push(dest);
                            moved = true;
                            handled = true;
                        }
                        break;
                    }
                    if (!handled && (nr !== r || nc !== c)) {
                        grid[r][c] = null;
                        grid[nr][nc] = tile;
                        tile.r = nr; tile.c = nc;
                        moved = true;
                    }
                }
            }

            if (!moved) return;

            // Скольжение: переставляем все плитки на новые позиции (анимирует CSS transition)
            tiles.forEach(t => positionTile(t.el, t.r, t.c));

            // Поглощённые плитки убираем после завершения скольжения
            absorbed.forEach(t => {
                t.el.style.zIndex = '1';
                setTimeout(() => { if (t.el.parentNode) t.el.remove(); }, 150);
            });
            tiles = tiles.filter(t => !absorbed.includes(t));

            // Плитки-приёмники: обновляем значение и даём «пульс» после слияния
            mergedDest.forEach(t => {
                setTimeout(() => {
                    t.el.dataset.value = t.val;
                    t.el.textContent = t.val;
                    t.el.style.animation = 'tileMerge 0.18s ease';
                    setTimeout(() => { t.el.style.animation = ''; }, 180);
                }, 110);
            });

            if (score > bestScore) bestScore = score;
            document.getElementById('score').textContent = score;
            document.getElementById('best-score').textContent = bestScore;

            addNewTile();
            syncBoard();

            if (checkGameOver()) endGame();
            if (navigator.vibrate) navigator.vibrate(50);
        }
    
        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return false;
                    if (c < 3 && board[r][c] === board[r][c+1]) return false;
                    if (r < 3 && board[r][c] === board[r+1][c]) return false;
                }
            }
            return true;
        }
    
        // ====== СВАЙПЫ: ТОЛЬКО НА ИГРОВОМ ПОЛЕ ======
        // Важно: вешаем на game-board, а НЕ на document.
        // Так свайп работает только когда палец внутри поля,
        // и не конфликтует с глобальной блокировкой touchmove выше.
        let gameTouchStartX = null, gameTouchStartY = null;

        function attachGameSwipes() {
            const gameBoard = document.getElementById('game-board');
            if (!gameBoard || gameBoard._swipesAttached) return;
            gameBoard._swipesAttached = true;

            // Говорим браузерному движку: никакого скролла с этого элемента.
            // Это работает на уровне ниже JS — до того как события вообще возникают.
            gameBoard.style.touchAction = 'none';

            gameBoard.addEventListener('touchstart', e => {
                gameTouchStartX = e.touches[0].clientX;
                gameTouchStartY = e.touches[0].clientY;
                e.stopPropagation();
            }, { passive: true });

            // touchmove на самом поле — e.preventDefault() не нужен,
            // потому что document уже заблокировал всё выше.
            // stopPropagation здесь для надёжности.
            gameBoard.addEventListener('touchmove', e => {
                e.stopPropagation();
            }, { passive: true });

            gameBoard.addEventListener('touchend', e => {
                if (gameTouchStartX === null) return;

                const dx = e.changedTouches[0].clientX - gameTouchStartX;
                const dy = e.changedTouches[0].clientY - gameTouchStartY;

                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);
                const minSwipe = 30; // минимальная длина свайпа в пикселях

                if (Math.max(absDx, absDy) > minSwipe) {
                    if (absDx > absDy) {
                        move(dx > 0 ? 'right' : 'left');
                    } else {
                        move(dy > 0 ? 'down' : 'up');
                    }
                }

                gameTouchStartX = null;
                gameTouchStartY = null;
                e.stopPropagation();
            }, { passive: true });
        }
    
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') move('left');
            else if (e.key === 'ArrowRight') move('right');
            else if (e.key === 'ArrowUp') move('up');
            else if (e.key === 'ArrowDown') move('down');
        });
    
        async function loadMiniLeaderboard() {
            try {
                const api = window.apiFetch || fetch;
                const response = await api('/api/leaderboard/2048');
                const data = await response.json();
                const tbody = document.getElementById('mini-lb-body');
                tbody.innerHTML = '';
    
                if (data.leaders && data.leaders.length > 0) {
                    data.leaders.forEach((player, index) => {
                        const rankClass = index < 3 ? `rank-${index + 1}` : '';
                        tbody.innerHTML += `
                            <tr class="${rankClass}">
                                <td>${index + 1}</td>
                                <td>${player.first_name}</td>
                                <td style="text-align:right; font-weight:bold; color:var(--neon-blue);">${player.score}</td>
                            </tr>`;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">Пока нет рекордов</td></tr>`;
                }
            } catch (e) {
                console.error("Не удалось загрузить топ", e);
            }
        }
    
        // Продолжить за 10⭐ — счёт сохраняется, освобождаем место (убираем 4 младшие плитки)
        function continueGame() {
            window.continueForStars(() => {
                const sorted = [...tiles].sort((a, b) => a.val - b.val).slice(0, 4);
                sorted.forEach((t) => {
                    grid[t.r][t.c] = null;
                    if (t.el && t.el.parentNode) t.el.remove();
                });
                tiles = tiles.filter((t) => !sorted.includes(t));
                syncBoard();
                gameOver = false;
                document.querySelectorAll('.screen').forEach((el) => el.classList.remove('active'));
                document.getElementById('game-screen').classList.add('active');
            });
        }
        window.continueGame = continueGame;

        function startGame() {
            if (window.GameGuard) GameGuard.start('2048');
            score = 0;
            gameOver = false;
            initBoard();
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
            // Подключаем свайпы на game-board (безопасно вызывать несколько раз)
            attachGameSwipes();
        }
    
        function endGame() {
            gameOver = true;
            if (window.Energy) Energy.endSession();
            document.getElementById('final-score').textContent = score;
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById('end-screen').classList.add('active');
            
            const user = tg.initDataUnsafe?.user;
            if (user && score > 0) {
                const api = window.apiFetch || fetch;
                api('/api/save_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        first_name: user.first_name || user.username || "Игрок",
                        game: '2048',
                        token: window.GameGuard?.token,
                        score: score
                    })
                }).then(() => loadMiniLeaderboard())
                  .catch(err => console.error('Save error:', err));
            } else {
                loadMiniLeaderboard();
            }
        }
    
        // Инициализация
        window.onload = () => {
            loadMiniLeaderboard();
        };
    </script>

    <script src="../energy.js"></script>
    <script>
        // ⚡ 2048 стоит 2 энергии за игру (игра длиннее)
        const GAME2048_ENERGY_COST = 2;
        const trySpend = Energy.init(GAME2048_ENERGY_COST, 'game2048-start-btn', 'energy-container');

        function tryStartGame() {
            if (trySpend()) {
                startGame();
            }
        }
    </script>
