<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Chin | Chin Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../js/api.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { user-select:none!important; -webkit-user-select:none!important; -webkit-tap-highlight-color:transparent!important; box-sizing:border-box; }
        html, body {
            overscroll-behavior:none!important;
            touch-action:none!important;
            overflow:hidden!important;
            height:100%!important;
            position:fixed!important;
            width:100%!important;
            margin:0!important;
        }

        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #bc13fe;
            --neon-purple: #7a04eb;
            --bg-dark: #1a103d;
            --glass: rgba(255,255,255,0.05);
        }

        body {
            margin:0; padding:0; font-family:'Rajdhani',sans-serif; background:linear-gradient(180deg,#0d081a 0%,#120b2e 35%,#1a103d 100%); color:#fff;
            height:100vh; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center;
            position:relative;
        }

        .bg-grid, .bg-glow { position:absolute; top:0; left:0; width:200%; height:200%; z-index:-2; pointer-events:none; }
        .bg-grid {
            background-image:linear-gradient(rgba(188,19,254,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(0,243,255,0.2) 1px,transparent 1px);
            background-size:40px 40px;
            transform:perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation:gridMove 20s linear infinite; opacity:0.6;
        }
        .bg-glow {
            background:radial-gradient(circle, rgba(122,4,235,0.3) 0%, rgba(42,16,80,0) 70%);
            top:50%; left:50%; width:150vw; height:150vw; transform:translate(-50%,-50%);
            animation:pulseGlow 4s ease-in-out infinite alternate;
        }
        @keyframes gridMove { 0% { transform:perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform:perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }
        @keyframes pulseGlow { 0% { opacity:0.5; } 100% { opacity:0.8; transform:translate(-50%,-50%) scale(1.1); } }

        .game-container {
            text-align:center; width:calc(100% - 24px); max-width:min(420px, calc(100vw - 24px)); padding:14px 12px;
            background:var(--glass); border-radius:20px; border:1px solid rgba(255,255,255,0.1);
            backdrop-filter:blur(10px); box-shadow:0 0 30px rgba(188,19,254,0.2);
            animation:slideUp 0.5s ease-out; box-sizing:border-box;
            margin-bottom:calc(70px + env(safe-area-inset-bottom, 0px)) !important;
        }

        #start-screen.game-container {
            max-height:calc(100vh - 70px - env(safe-area-inset-bottom, 0px));
            overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y!important;
            padding-bottom: 20px;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        h1 { font-family:'Orbitron',sans-serif; font-size:28px; margin:0 0 10px 0; color:#fff; text-shadow:0 0 10px var(--neon-pink); }

        #game-canvas {
            display:block; margin:0 auto; width:100%; max-width:360px; height:auto; aspect-ratio:3/4;
            background:#1a103d; border:3px solid var(--neon-purple); border-radius:12px;
            box-shadow:0 0 25px rgba(122,4,235,0.5); touch-action:none!important;
        }

        .stats-row { display:flex; justify-content:space-between; gap:8px; margin:10px 0; font-family:'Orbitron',sans-serif; font-size:clamp(12px, 3.5vw, 16px); }
        .stat-box { flex:1; background:rgba(0,0,0,0.5); padding:6px 8px; border-radius:10px; border:1px solid var(--neon-purple); }

        .start-btn, .restart-btn {
            width:100%; padding:18px; font-family:'Orbitron',sans-serif; font-size:20px; font-weight:bold;
            background:linear-gradient(45deg, var(--neon-purple), var(--neon-pink)); border:none; border-radius:12px;
            color:#fff; cursor:pointer; box-shadow:0 0 20px rgba(188,19,254,0.5);
        }
        .start-btn:active, .restart-btn:active { transform:scale(0.95); }

        .screen { display:none; }
        .screen.active { display:block; }

        .leaderboard-mini { margin-top:25px; background:rgba(0,0,0,0.6); border-radius:12px; padding:15px; border:1px solid var(--neon-purple); }
        .leaderboard-mini h3 { margin:0 0 12px 0; color:var(--neon-pink); text-align:center; font-family:'Orbitron',sans-serif; }

        #game-screen.game-container { padding:10px 10px 72px; max-width:100vw; }

        .canvas-wrap { position:relative; display:inline-block; width:100%; max-width:360px; margin:0 auto; }
        .start-overlay {
            position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            background:rgba(42,16,80,0.65); border-radius:12px; pointer-events:none;
            font-family:'Orbitron',sans-serif; font-size:clamp(14px,4vw,20px); font-weight:bold;
            color:#fff; text-shadow:0 0 12px var(--neon-pink); text-align:center; padding:12px;
        }
        .start-overlay.hidden { display:none; }

        .chin-navbar {
            position:fixed; bottom:0; left:0; right:0;
            height:calc(60px + env(safe-area-inset-bottom,0px));
            padding-bottom:env(safe-area-inset-bottom,0px);
            background:rgba(42,16,80,0.94); border-top:1px solid rgba(0,255,255,0.2);
            backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
            display:flex; align-items:flex-start; justify-content:space-around;
            z-index:1000; box-shadow:0 -4px 24px rgba(0,0,0,0.7);
        }
        .chin-navbar__item {
            flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:4px; padding-top:10px; cursor:pointer; text-decoration:none;
            color:rgba(255,255,255,0.4); font-family:'Orbitron',sans-serif;
            font-size:9px; letter-spacing:0.5px; text-transform:uppercase; transition:color 0.2s;
        }
        .chin-navbar__item:active { transform:scale(0.9); }
        .chin-navbar__icon { width:24px; height:24px; display:flex; align-items:center; justify-content:center; transition:filter 0.2s, transform 0.2s; }
        .chin-navbar__item--active { color:#00ffff; }
        .chin-navbar__item--active .chin-navbar__icon { filter:drop-shadow(0 0 7px #00ffff); transform:translateY(-2px); }
        .chin-navbar__dot { width:4px; height:4px; border-radius:50%; background:#00ffff; box-shadow:0 0 6px #00ffff; opacity:0; transition:opacity 0.2s; margin-top:-2px; }
        .chin-navbar__item--active .chin-navbar__dot { opacity:1; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- Стартовый экран -->
    <div id="start-screen" class="screen active game-container">
        <h1>FLAPPY CHIN</h1>
        <p style="color:rgba(255,255,255,0.8); margin-bottom:20px;">Тапни — лети между трубами!</p>
        <div style="margin-bottom:25px;"><img src="../icons/bird.png" alt="Flappy Chin" style="width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(188,19,254,0.6));"></div>

        <button id="flappy-start-btn" class="start-btn" onclick="tryStartGame()">НАЧАТЬ ИГРУ</button>

        <div id="energy-container" style="display:flex;justify-content:center;margin-top:14px;"></div>

        <div class="leaderboard-mini">
            <h3><img src="../icons/cup.png" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;"> ТОП-10 ИГРОКОВ</h3>
            <table style="width:100%;font-size:0.95rem;"><tbody id="mini-lb-body"></tbody></table>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="game-screen" class="screen game-container">
        <div class="stats-row">
            <div class="stat-box">Счёт: <span id="current-score" style="color:var(--neon-blue)">0</span></div>
            <div class="stat-box">Рекорд: <span id="best-score-game" style="color:var(--neon-pink)">0</span></div>
        </div>
        <div class="canvas-wrap">
            <canvas id="game-canvas" width="360" height="480"></canvas>
            <div id="start-overlay" class="start-overlay hidden">Тапни, чтобы начать</div>
        </div>
        <p style="margin-top:12px;color:rgba(255,255,255,0.6);font-size:14px;">Тапни, чтобы подняться</p>
    </div>

    <!-- Game Over -->
    <div id="end-screen" class="screen game-container">
        <h1 style="color:var(--neon-pink);font-size:22px;">GAME OVER</h1>
        <p style="font-size:18px;margin:8px 0;">Твой счёт:</p>
        <div style="font-size:52px;font-weight:900;color:var(--neon-blue);text-shadow:0 0 20px var(--neon-blue);margin:12px 0;">
            <span id="final-score">0</span>
        </div>
        <p style="font-size:16px;color:rgba(255,255,255,0.6);">Рекорд: <span id="final-best" style="color:var(--neon-pink)"></span></p>
        <button class="restart-btn" onclick="tryStartGame()">ИГРАТЬ СНОВА</button>
    </div>

    <nav class="chin-navbar">
        <a class="chin-navbar__item chin-navbar__item--active" href="../index.html">
            <span class="chin-navbar__icon"><img src="../icons/games.png" alt="Игры" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,255,255,0.3));"></span>
            <span>Игры</span>
            <span class="chin-navbar__dot"></span>
        </a>
        <a class="chin-navbar__item" href="../profile.html">
            <span class="chin-navbar__icon"><img src="../icons/profile.png" alt="Профиль" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,255,255,0.3));"></span>
            <span>Профиль</span>
            <span class="chin-navbar__dot"></span>
        </a>
        <a class="chin-navbar__item" href="../shop.html">
            <span class="chin-navbar__icon"><img src="../icons/shop.png" alt="Магазин" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,255,255,0.3));"></span>
            <span>Магазин</span>
            <span class="chin-navbar__dot"></span>
        </a>
    </nav>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { 
            tg.ready(); 
            // Полный экран только на телефоне
            if (typeof window.initTelegramFullscreen === 'function') {
              window.initTelegramFullscreen();
            } else {
              tg.expand();
            }
            tg.enableClosingConfirmation();

            // === Кнопка "Назад" в шапке Telegram (как в лобби Дурака) ===
            if (tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(() => {
                    if (tg.BackButton) tg.BackButton.hide();
                    window.location.href = '../index.html';
                });
            }
        }

        // ── Проверка бана + запуск периодической проверки ──
        if (window.enforceBanIfNeeded) {
            window.enforceBanIfNeeded();
        }
        if (window.startBanWatcher) {
            window.startBanWatcher(45000);
        }

        document.documentElement.style.overscrollBehavior = 'none';
        document.body.style.overscrollBehavior = 'none';
        document.body.style.touchAction = 'none';
        document.body.style.overflow = 'hidden';

        // Разрешаем скролл только внутри стартового меню (для полного лидерборда)
        document.addEventListener('touchmove', e => {
            const startScreen = document.getElementById('start-screen');
            if (startScreen && startScreen.contains(e.target)) {
                return;
            }
            e.preventDefault();
        }, { passive: false });

        function applyTopPadding() {
            const tgTop = tg?.contentSafeAreaInsets?.top ?? 0;
            const sysTop = tg?.safeAreaInsets?.top ?? 0;
            const topPad = Math.max(tgTop, sysTop);
            document.body.style.paddingTop = topPad + 'px';
            document.body.style.paddingLeft = '0';
            document.body.style.paddingRight = '0';
            document.body.style.paddingBottom = '0';
        }
        applyTopPadding();
        setTimeout(applyTopPadding, 300);
        if (tg) {
            tg.onEvent('viewportChanged', applyTopPadding);
            tg.onEvent('safeAreaChanged', applyTopPadding);
            tg.onEvent('contentSafeAreaChanged', applyTopPadding);
        }

        const canvas = document.getElementById('game-canvas');
        const startOverlay = document.getElementById('start-overlay');
        const ctx = canvas.getContext('2d');
        const API = 'https://chingames.duckdns.org';
        const GAME_ID = 'flappy';

        const chinImg = new Image();
        chinImg.src = '../icons/chin.png';
        let chinReady = false;
        chinImg.onload = () => { chinReady = true; };

        let gameRunning = false;
        let waitingForStart = false;
        let score = 0;
        let bestScore = 0;
        let bird = { x: 80, y: 200, velocity: 0, radius: 16 };
        const gravity = 0.45;
        const flapStrength = -7.4;
        let pipes = [];
        let frame = 0;
        const pipeGap = 148;
        const pipeWidth = 60;
        const pipeSpeed = 2.8;
        function updateBestDisplays() {
            const el = document.getElementById('best-score-game');
            if (el) el.textContent = bestScore;
        }

        async function loadBestScore() {
            const userId = tg?.initDataUnsafe?.user?.id;
            if (!userId) return;
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/stats/${userId}/${GAME_ID}`);
                if (!res.ok) return;
                const data = await res.json();
                bestScore = data.score || 0;
                updateBestDisplays();
            } catch (e) {}
        }

        async function saveScoreToServer(finalScore) {
            const user = tg?.initDataUnsafe?.user;
            if (!user || finalScore <= 0) return;
            try {
                const api = window.apiFetch || fetch;
                await api('/api/save_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        first_name: user.first_name || user.username || 'Игрок',
                        game: GAME_ID,
                        score: finalScore
                    })
                });
            } catch (e) { console.error(e); }
        }

        async function loadMiniLeaderboard() {
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/leaderboard/${GAME_ID}`);
                const data = await res.json();
                const tbody = document.getElementById('mini-lb-body');
                tbody.innerHTML = '';
                if (data.leaders && data.leaders.length) {
                    data.leaders.forEach((p, i) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="padding:4px 6px;">${i + 1}</td>
                            <td style="padding:4px 6px;">${escapeHtml(p.first_name || 'Игрок')}</td>
                            <td style="padding:4px 6px;text-align:right;font-weight:bold;color:var(--neon-blue);">${p.score}</td>`;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#888;padding:8px;">Пока нет рекордов</td></tr>';
                }
            } catch (e) {}
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function drawBackground() {
            ctx.fillStyle = '#1a103d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(122,4,235,0.35)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            const angle = Math.min(Math.max(bird.velocity * 3, -30), 70) * Math.PI / 180;
            ctx.rotate(angle);
            const size = bird.radius * 2.4;
            if (chinReady) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(0,243,255,0.8)';
                ctx.drawImage(chinImg, -size / 2, -size / 2, size, size);
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = '#00f3ff';
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPipes() {
            for (const pipe of pipes) {
                const grad = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                grad.addColorStop(0, '#bc13fe');
                grad.addColorStop(1, '#7a04eb');
                ctx.fillStyle = grad;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#bc13fe';
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.fillRect(pipe.x, pipe.top + pipeGap, pipeWidth, canvas.height);
                ctx.fillStyle = '#00f3ff';
                ctx.fillRect(pipe.x, pipe.top - 8, pipeWidth, 8);
                ctx.fillRect(pipe.x, pipe.top + pipeGap, pipeWidth, 8);
            }
            ctx.shadowBlur = 0;
        }

        function updateBird() {
            if (waitingForStart) return;
            bird.velocity += gravity;
            bird.y += bird.velocity;
            if (bird.y > canvas.height - 36) { bird.y = canvas.height - 36; endGame(); }
            if (bird.y < bird.radius) { bird.y = bird.radius; bird.velocity = 0; }
        }

        function updatePipes() {
            if (waitingForStart) return;
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;
                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    score++;
                    document.getElementById('current-score').textContent = score;
                }
                if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
            }
            if (frame % 75 === 0) {
                const top = Math.random() * (canvas.height - pipeGap - 120) + 40;
                pipes.push({ x: canvas.width + 20, top, passed: false });
            }
        }

        function checkCollision() {
            if (waitingForStart) return;
            for (const pipe of pipes) {
                if (bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipeWidth &&
                    (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.top + pipeGap)) {
                    endGame();
                    return;
                }
            }
        }

        function gameLoop() {
            if (!gameRunning) return;
            frame++;
            drawBackground();
            updateBird();
            updatePipes();
            checkCollision();
            drawPipes();
            drawBird();
            requestAnimationFrame(gameLoop);
        }

        function flap(e) {
            if (e) e.preventDefault();
            if (!gameRunning) return;
            if (waitingForStart) {
                waitingForStart = false;
                startOverlay.classList.add('hidden');
                bird.velocity = flapStrength;
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                return;
            }
            bird.velocity = flapStrength;
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function startGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            score = 0;
            pipes = [{ x: canvas.width * 0.55, top: 160, passed: true }];
            frame = 0;
            waitingForStart = true;
            document.getElementById('current-score').textContent = '0';
            gameRunning = true;
            startOverlay.classList.remove('hidden');

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');

            canvas.addEventListener('touchstart', flap, { passive: false });
            canvas.addEventListener('mousedown', flap);

            drawBackground();
            drawPipes();
            drawBird();
            gameLoop();
        }

        function endGame() {
            if (!gameRunning) return;
            gameRunning = false;
            if (window.Energy) Energy.endSession();
            waitingForStart = false;
            startOverlay.classList.add('hidden');
            canvas.removeEventListener('touchstart', flap);
            canvas.removeEventListener('mousedown', flap);

            if (score > bestScore) bestScore = score;
            updateBestDisplays();
            saveScoreToServer(score);

            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('end-screen').classList.add('active');

            document.getElementById('final-score').textContent = score;
            document.getElementById('final-best').textContent = bestScore;

            loadMiniLeaderboard();
        }

        window.onload = () => {
            loadBestScore();
            loadMiniLeaderboard();
        };
    </script>

    <script src="../energy.js"></script>
    <script>
        const FLAPPY_ENERGY_COST = 1;
        const trySpend = Energy.init(FLAPPY_ENERGY_COST, 'flappy-start-btn', 'energy-container');

        function tryStartGame() {
            if (trySpend()) startGame();
        }
    </script>
</body>
</html>
