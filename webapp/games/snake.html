<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake | Chin Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../js/api.js"></script>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/game-page.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { user-select:none!important; -webkit-user-select:none!important; -webkit-tap-highlight-color:transparent!important; box-sizing:border-box; }
        html, body { overscroll-behavior:none!important; touch-action:none!important; overflow:hidden!important; height:100%!important; position:fixed!important; width:100%!important; margin:0!important; padding:0!important; }

        :root {
            --neon-blue: #ff66c9;
            --neon-pink: #bc13fe;
            --neon-purple: #7a04eb;
            --bg-dark: #1a103d;
            --glass: rgba(255,255,255,0.05);
        }

        body {
            margin:0; padding:0; font-family:'Rajdhani',sans-serif; background:linear-gradient(180deg,#0d081a 0%,#120b2e 35%,#1a103d 100%); color:#fff;
            height:100vh; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative;
        }

        .bg-grid, .bg-glow { position:absolute; top:0; left:0; width:200%; height:200%; z-index:-2; }
        .bg-grid { background-image:linear-gradient(rgba(188,19,254,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(255,102,201,0.2) 1px,transparent 1px); background-size:40px 40px; transform:perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation:gridMove 20s linear infinite;will-change:transform; opacity:0.6; }
        .bg-glow { background:radial-gradient(circle, rgba(122,4,235,0.3) 0%, rgba(42,16,80,0) 70%); top:50%; left:50%; width:150vw; height:150vw; transform:translate(-50%,-50%); animation:pulseGlow 4s ease-in-out infinite alternate; }

        @keyframes gridMove { 0% { transform:perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform:perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }
        @keyframes pulseGlow { 0% { opacity:0.5; } 100% { opacity:0.8; transform:translate(-50%,-50%) scale(1.1); } }

        .game-container {
            text-align:center; width:calc(100% - 24px); max-width:min(420px, calc(100vw - 24px)); padding:14px 12px;
            background:var(--glass); border-radius:20px; border:1px solid rgba(255,255,255,0.1);
            backdrop-filter:blur(10px); box-shadow:0 0 30px rgba(188,19,254,0.2);
            animation:slideUp 0.5s ease-out; box-sizing:border-box;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        /* Allow scrolling the start menu (incl. full leaderboard) like in Flappy Chin */
        #start-screen.game-container {
            max-height:calc(100vh - 70px - env(safe-area-inset-bottom, 0px));
            overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y!important;
            padding-bottom: 20px;
        }

        h1 { font-family:'Orbitron',sans-serif; font-size:28px; margin:0 0 10px 0; color:#fff; text-shadow:0 0 10px var(--neon-pink); }

        .game-board {
            background:rgba(0,0,0,0.6); border:2px solid var(--neon-purple); border-radius:12px;
            padding:6px; display:grid; gap:2px; margin:12px auto; box-shadow:0 0 25px rgba(122,4,235,0.4);
            width:100%; max-width:100%; aspect-ratio:1; box-sizing:border-box;
            touch-action:none!important; overscroll-behavior:none!important;
        }

        .cell {
            width:100%; aspect-ratio:1; min-width:0; min-height:0;
            background:rgba(255,255,255,0.05); border-radius:2px;
        }

        .snake { background:linear-gradient(135deg, #ff66c9, #a347f8); box-shadow:0 0 8px #ff66c9; }
        .food  { background:linear-gradient(135deg, #ff00aa, #ff4488); box-shadow:0 0 12px #ff00aa; animation:foodPulse 0.8s infinite alternate; }

        @keyframes foodPulse { from { transform:scale(0.9); } to { transform:scale(1.15); } }

        .stats-row { display:flex; justify-content:space-between; gap:8px; margin-bottom:10px; font-family:'Orbitron',sans-serif; font-size:clamp(12px, 3.5vw, 18px); }
        .stat-box { flex:1; background:rgba(0,0,0,0.5); padding:6px 8px; border-radius:10px; border:1px solid var(--neon-purple); }

        .start-btn, .restart-btn {
            width:100%; padding:18px; font-family:'Orbitron',sans-serif; font-size:20px; font-weight:bold;
            background:linear-gradient(45deg, var(--neon-purple), var(--neon-pink)); border:none; border-radius:12px;
            color:#fff; cursor:pointer; box-shadow:0 0 20px rgba(188,19,254,0.5);
        }
        .start-btn:active, .restart-btn:active { transform:scale(0.95); }

        .screen { display:none; }
        .screen.active { display:block; }

        #game-screen.game-container { padding:10px 10px 72px; max-width:100vw; }

        /* Экранный D-pad управления */
        .dpad {
            display:grid;
            grid-template-columns:repeat(3, 56px);
            grid-template-rows:repeat(2, 56px);
            gap:8px; margin:16px auto 0; justify-content:center;
            touch-action:none;
        }
        .dpad-up    { grid-column:2; grid-row:1; }
        .dpad-left  { grid-column:1; grid-row:2; }
        .dpad-right { grid-column:3; grid-row:2; }
        .dpad-down  { grid-column:2; grid-row:2; }
        .dpad-btn {
            width:56px; height:56px; border-radius:14px;
            background:rgba(255,102,201,0.08);
            border:1.5px solid rgba(255,102,201,0.4);
            color:var(--neon-blue, #ff66c9);
            font-size:22px; line-height:1; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            -webkit-user-select:none; user-select:none;
            box-shadow:0 0 10px rgba(255,102,201,0.12);
            transition:transform .05s, background .1s;
        }
        .dpad-btn:active {
            transform:scale(0.92);
            background:rgba(255,102,201,0.22);
        }
        @media (prefers-reduced-motion: reduce) {
            .bg-grid, .bg-stars, h1.glitch::before, h1.glitch::after { animation: none !important; }
        }

        /* На малых экранах (iPhone SE и т.п.) уменьшаем D-pad, чтобы доска + стата + D-pad влезали без скролла */
        @media (max-height: 670px) {
            .dpad {
                grid-template-columns:repeat(3, 48px);
                grid-template-rows:repeat(2, 48px);
                gap:6px; margin:10px auto 0;
            }
            .dpad-btn {
                width:48px; height:48px; font-size:18px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- Стартовый экран -->
    <div id="start-screen" class="screen active game-container">
        <div class="game-header">
            <h1>SNAKE</h1>
            <p>Классика. Ешь, расти, не врежься!</p>
        </div>
        <div class="game-icon-box"><img src="../icons/snake.png" alt="Snake"></div>

        <button id="snake-start-btn" class="start-btn" onclick="tryStartGame()">НАЧАТЬ ИГРУ</button>

        <!-- Энергия -->
        <div id="energy-container" style="display:flex;justify-content:center;margin-top:14px;"></div>

        <!-- Мини-лидерборд -->
        <div class="leaderboard-mini">
            <h3><img src="../icons/cup.webp" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;"> ТОП-10 ИГРОКОВ</h3>
            <table style="width:100%;font-size:0.95rem;"><tbody id="mini-lb-body"></tbody></table>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="game-screen" class="screen game-container">
        <div class="stats-row">
            <div class="stat-box">Счёт: <span id="score" style="color:var(--neon-blue)">0</span></div>
            <div class="stat-box">Рекорд: <span id="best-score" style="color:var(--neon-blue)">0</span></div>
        </div>
        <div id="game-board" class="game-board"></div>
        <div class="dpad">
            <button class="dpad-btn dpad-up"    data-dir="up"    aria-label="Вверх">▲</button>
            <button class="dpad-btn dpad-left"  data-dir="left"  aria-label="Влево">◀</button>
            <button class="dpad-btn dpad-right" data-dir="right" aria-label="Вправо">▶</button>
            <button class="dpad-btn dpad-down"  data-dir="down"  aria-label="Вниз">▼</button>
        </div>
    </div>

    <!-- Экран окончания -->
    <div id="end-screen" class="screen game-container">
        <h1 style="color:var(--neon-pink)">ИГРА ОКОНЧЕНА</h1>
        <p style="font-size:18px;">Твой результат:</p>
        <div style="font-size:62px;font-weight:900;color:var(--neon-blue);text-shadow:0 0 20px var(--neon-blue);margin:20px 0;">
            <span id="final-score">0</span>
        </div>
        <button class="restart-btn js-continue" onclick="continueGame()" style="background:linear-gradient(135deg,#ffd700,#ff9500);color:#1a1a1a;">Продолжить · 100 choin</button>
        <button class="restart-btn" onclick="tryStartGame()" style="margin-top:10px;">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { 
            tg.ready(); 
            // Полный экран только на телефоне
            if (typeof window.initTelegramFullscreen === 'function') {
              window.initTelegramFullscreen();
            } else {
              tg.expand();
            }
            tg.enableClosingConfirmation();

            // === Кнопка "Назад" в шапке Telegram (как в лобби Дурака) ===
            if (tg.BackButton) {
                tg.BackButton.show();
                tg.BackButton.onClick(() => {
                    if (tg.BackButton) tg.BackButton.hide();
                    window.location.href = '../index.html';
                });
            }
        }

        // ── Проверка бана + запуск периодической проверки ──
        if (window.enforceBanIfNeeded) {
            window.enforceBanIfNeeded();
        }
        if (window.startBanWatcher) {
            window.startBanWatcher(45000);
        }

        // Защита от свайпов
        document.documentElement.style.overscrollBehavior = 'none';
        document.body.style.overscrollBehavior = 'none';
        document.body.style.touchAction = 'none';
        document.body.style.overflow = 'hidden';

        // Разрешаем скролл только внутри стартового меню (для полного лидерборда, как во Flappy)
        document.addEventListener('touchmove', e => {
            const startScreen = document.getElementById('start-screen');
            if (startScreen && startScreen.contains(e.target)) {
                return;
            }
            e.preventDefault();
        }, { passive: false });

        let boardSize = 15;
        let snake = [{x:7,y:7}];
        let dx = 1, dy = 0;
        let dirQueue = [];        // очередь поворотов: 1 применяется за тик
        let food = {};

        // Поставить поворот в очередь. Валидируем против ПОСЛЕДНЕГО запланированного
        // направления (а не текущего dx/dy) — это убирает разворот в себя при
        // двух быстрых нажатиях в одном тике.
        function setDir(ndx, ndy) {
            const last = dirQueue.length ? dirQueue[dirQueue.length - 1] : { x: dx, y: dy };
            if (ndx === -last.x && ndy === -last.y) return;  // нельзя развернуться на 180°
            if (ndx === last.x && ndy === last.y) return;    // тот же курс — игнор
            if (dirQueue.length < 3) dirQueue.push({ x: ndx, y: ndy });
        }
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('cg_snake_best') || '0', 10);
        let gameInterval = null;
        let speed = 210; // ms

        const gameBoard = document.getElementById('game-board');

        function updateBestScoreDisplay() {
            document.getElementById('best-score').textContent = bestScore;
        }

        function applySpeed() {
            clearInterval(gameInterval);
            gameInterval = setInterval(move, speed);
        }

        let cellEls = [];
        let prevLitIdx = new Set();

        function initBoard() {
            gameBoard.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
            gameBoard.innerHTML = '';
            cellEls = [];
            prevLitIdx = new Set();
            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                gameBoard.appendChild(cell);
                cellEls.push(cell);
            }
        }

        function placeFood() {
            let x, y;
            do {
                x = Math.floor(Math.random() * boardSize);
                y = Math.floor(Math.random() * boardSize);
            } while (snake.some(s => s.x === x && s.y === y));
            food = {x, y};
        }

        function render() {
            const newLitIdx = new Set();

            snake.forEach(segment => {
                newLitIdx.add(segment.y * boardSize + segment.x);
            });
            const foodIdx = food.y * boardSize + food.x;
            newLitIdx.add(foodIdx);

            // Снять подсветку с клеток, которые больше не заняты
            for (const idx of prevLitIdx) {
                if (!newLitIdx.has(idx) && cellEls[idx]) cellEls[idx].className = 'cell';
            }

            // Подсветить занятые клетки
            for (const idx of newLitIdx) {
                if (cellEls[idx]) cellEls[idx].className = idx === foodIdx ? 'cell food' : 'cell snake';
            }

            prevLitIdx = newLitIdx;
        }

        function move() {
            // Применяем один поворот из очереди на каждый тик
            if (dirQueue.length) {
                const d = dirQueue.shift();
                dx = d.x; dy = d.y;
            }
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Столкновение со стеной
            if (head.x < 0 || head.x >= boardSize || head.y < 0 || head.y >= boardSize) return endGame();

            const willEat = head.x === food.x && head.y === food.y;
            const bodyToCheck = willEat ? snake : snake.slice(0, -1);
            if (bodyToCheck.some(s => s.x === head.x && s.y === head.y)) return endGame();

            snake.unshift(head);

            if (willEat) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                placeFood();
                if (score % 50 === 0 && speed > 140) {
                    speed -= 10;
                    applySpeed();
                }
            } else {
                snake.pop();
            }

            render();
        }

        // Продолжить после проигрыша за 10⭐ — счёт сохраняется, змейка возрождается
        function continueGame() {
            window.continueForStars(() => {
                snake = [{x:7,y:7}];
                dx = 1; dy = 0;
                dirQueue = [];
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('game-screen').classList.add('active');
                placeFood();
                render();
                applySpeed();
            });
        }
        window.continueGame = continueGame;

        function startGame() {
            if (window.GameGuard) GameGuard.start('snake');
            snake = [{x:7,y:7}];
            dx = 1; dy = 0;
            dirQueue = [];
            score = 0;
            speed = 210;
            document.getElementById('score').textContent = '0';
            updateBestScoreDisplay();
            initBoard();
            placeFood();
            render();

            applySpeed();

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
        }

        function endGame() {
            clearInterval(gameInterval);
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            if (window.Energy) Energy.endSession();
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('cg_snake_best', String(bestScore));
            }
            updateBestScoreDisplay();
            document.getElementById('final-score').textContent = score;

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('end-screen').classList.add('active');

            const user = tg?.initDataUnsafe?.user;
            if (user && score > 0) {
                const api = window.apiFetch || fetch;
                api('/api/save_score', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: user.id,
                        first_name: user.first_name || user.username || "Игрок",
                        game: 'snake',
                        token: window.GameGuard?.token,
                        score: score
                    })
                }).then(() => loadMiniLeaderboard()).catch(() => loadMiniLeaderboard());
            } else {
                loadMiniLeaderboard();
            }
        }

        async function loadMiniLeaderboard() {
            try {
                const api = window.apiFetch || fetch;
                const res = await api('/api/leaderboard/snake');
                const data = await res.json();
                const tbody = document.getElementById('mini-lb-body');
                tbody.innerHTML = '';

                if (data.leaders && data.leaders.length) {
                    data.leaders.forEach((p, i) => {
                        const tr = document.createElement('tr');
                        const tdRank = document.createElement('td');
                        tdRank.textContent = i + 1;
                        const tdName = document.createElement('td');
                        tdName.textContent = p.first_name || 'Игрок';
                        const tdScore = document.createElement('td');
                        tdScore.textContent = p.score;
                        tdScore.style.textAlign = 'right';
                        tdScore.style.fontWeight = 'bold';
                        tdScore.style.color = 'var(--neon-blue)';
                        tr.append(tdRank, tdName, tdScore);
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#888;">Пока нет рекордов</td></tr>`;
                }
            } catch(e) {}
        }

        // Управление
        document.addEventListener('keydown', e => {
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.key) === -1) return;
            e.preventDefault();
            if (e.key === 'ArrowLeft')  setDir(-1, 0);
            if (e.key === 'ArrowRight') setDir(1, 0);
            if (e.key === 'ArrowUp')    setDir(0, -1);
            if (e.key === 'ArrowDown')  setDir(0, 1);
        });

        // Свайпы — обрабатываем на touchmove, чтобы быстрая смена направления
        // в одном жесте (диагональный свайп) ставила несколько поворотов в очередь.
        const SWIPE_THRESHOLD = 30;
        let touchAnchorX = 0, touchAnchorY = 0;
        gameBoard.addEventListener('touchstart', e => {
            touchAnchorX = e.touches[0].screenX;
            touchAnchorY = e.touches[0].screenY;
        }, {passive:true});

        gameBoard.addEventListener('touchmove', e => {
            const touch = e.touches[0];
            const dxTouch = touch.screenX - touchAnchorX;
            const dyTouch = touch.screenY - touchAnchorY;

            if (Math.abs(dxTouch) > Math.abs(dyTouch)) {
                if (dxTouch > SWIPE_THRESHOLD)  { setDir(1, 0);  touchAnchorX = touch.screenX; touchAnchorY = touch.screenY; }
                if (dxTouch < -SWIPE_THRESHOLD) { setDir(-1, 0); touchAnchorX = touch.screenX; touchAnchorY = touch.screenY; }
            } else {
                if (dyTouch > SWIPE_THRESHOLD)  { setDir(0, 1);  touchAnchorX = touch.screenX; touchAnchorY = touch.screenY; }
                if (dyTouch < -SWIPE_THRESHOLD) { setDir(0, -1); touchAnchorX = touch.screenX; touchAnchorY = touch.screenY; }
            }
        }, {passive:true});

        // Экранный D-pad (свайпы в webview ненадёжны — тестеры просили кнопки)
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            const handler = (e) => {
                e.preventDefault();
                const d = btn.dataset.dir;
                if (d === 'left')  setDir(-1, 0);
                if (d === 'right') setDir(1, 0);
                if (d === 'up')    setDir(0, -1);
                if (d === 'down')  setDir(0, 1);
            };
            btn.addEventListener('touchstart', handler, {passive:false});
            btn.addEventListener('mousedown', handler);
        });

        window.onload = () => {
            updateBestScoreDisplay();
            loadMiniLeaderboard();
        };
    </script>

    <div id="chin-navbar-mount"></div>
    <script src="../js/navbar.js"></script>

    <script src="../energy.js"></script>
    <script>
        const SNAKE_ENERGY_COST = 10;
        const trySpend = Energy.init(SNAKE_ENERGY_COST, 'snake-start-btn', 'energy-container');

        function tryStartGame() {
            if (trySpend()) startGame();
        }
    </script>
</body>
</html>
