<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake | Chin Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../js/api.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { user-select:none!important; -webkit-user-select:none!important; -webkit-tap-highlight-color:transparent!important; box-sizing:border-box; }
        html, body { overscroll-behavior:none!important; touch-action:none!important; overflow:hidden!important; height:100%!important; position:fixed!important; width:100%!important; margin:0!important; padding:0!important; }

        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #bc13fe;
            --neon-purple: #7a04eb;
            --bg-dark: #1a103d;
            --glass: rgba(255,255,255,0.05);
        }

        body {
            margin:0; padding:0; font-family:'Rajdhani',sans-serif; background:linear-gradient(180deg,#0d081a 0%,#120b2e 35%,#1a103d 100%); color:#fff;
            height:100vh; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative;
        }

        .bg-grid, .bg-glow { position:absolute; top:0; left:0; width:200%; height:200%; z-index:-2; }
        .bg-grid { background-image:linear-gradient(rgba(188,19,254,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(0,243,255,0.2) 1px,transparent 1px); background-size:40px 40px; transform:perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation:gridMove 20s linear infinite; opacity:0.6; }
        .bg-glow { background:radial-gradient(circle, rgba(122,4,235,0.3) 0%, rgba(42,16,80,0) 70%); top:50%; left:50%; width:150vw; height:150vw; transform:translate(-50%,-50%); animation:pulseGlow 4s ease-in-out infinite alternate; }

        @keyframes gridMove { 0% { transform:perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } 100% { transform:perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }
        @keyframes pulseGlow { 0% { opacity:0.5; } 100% { opacity:0.8; transform:translate(-50%,-50%) scale(1.1); } }

        .game-container {
            text-align:center; width:calc(100% - 24px); max-width:min(420px, calc(100vw - 24px)); padding:14px 12px;
            background:var(--glass); border-radius:20px; border:1px solid rgba(255,255,255,0.1);
            backdrop-filter:blur(10px); box-shadow:0 0 30px rgba(188,19,254,0.2);
            animation:slideUp 0.5s ease-out; box-sizing:border-box;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        h1 { font-family:'Orbitron',sans-serif; font-size:28px; margin:0 0 10px 0; color:#fff; text-shadow:0 0 10px var(--neon-pink); }

        .game-board {
            background:rgba(0,0,0,0.6); border:2px solid var(--neon-purple); border-radius:12px;
            padding:6px; display:grid; gap:2px; margin:12px auto; box-shadow:0 0 25px rgba(122,4,235,0.4);
            width:100%; max-width:100%; aspect-ratio:1; box-sizing:border-box;
            touch-action:none!important; overscroll-behavior:none!important;
        }

        .cell {
            width:100%; aspect-ratio:1; min-width:0; min-height:0;
            background:rgba(255,255,255,0.05); border-radius:2px;
        }

        .snake { background:linear-gradient(135deg, #00f3ff, #00aaff); box-shadow:0 0 8px #00f3ff; }
        .food  { background:linear-gradient(135deg, #ff00aa, #ff4488); box-shadow:0 0 12px #ff00aa; animation:foodPulse 0.8s infinite alternate; }

        @keyframes foodPulse { from { transform:scale(0.9); } to { transform:scale(1.15); } }

        .stats-row { display:flex; justify-content:space-between; gap:8px; margin-bottom:10px; font-family:'Orbitron',sans-serif; font-size:clamp(12px, 3.5vw, 18px); }
        .stat-box { flex:1; background:rgba(0,0,0,0.5); padding:6px 8px; border-radius:10px; border:1px solid var(--neon-purple); }

        .start-btn, .restart-btn {
            width:100%; padding:18px; font-family:'Orbitron',sans-serif; font-size:20px; font-weight:bold;
            background:linear-gradient(45deg, var(--neon-purple), var(--neon-pink)); border:none; border-radius:12px;
            color:#fff; cursor:pointer; box-shadow:0 0 20px rgba(188,19,254,0.5);
        }
        .start-btn:active, .restart-btn:active { transform:scale(0.95); }

        .screen { display:none; }
        .screen.active { display:block; }

        #game-screen.game-container { padding:10px 10px 72px; max-width:100vw; }

        .leaderboard-mini { margin-top:25px; background:rgba(0,0,0,0.6); border-radius:12px; padding:15px; border:1px solid var(--neon-purple); }
        .leaderboard-mini h3 { margin:0 0 12px 0; color:var(--neon-pink); text-align:center; font-family:'Orbitron',sans-serif; }

        .chin-navbar { position:fixed; bottom:0; left:0; right:0; height:calc(60px + env(safe-area-inset-bottom,0px)); padding-bottom:env(safe-area-inset-bottom,0px); background:rgba(42,16,80,0.94); border-top:1px solid rgba(0,255,255,0.2); backdrop-filter:blur(12px); display:flex; align-items:flex-start; justify-content:space-around; z-index:1000; box-shadow:0 -4px 24px rgba(0,0,0,0.7); }
        .chin-navbar__item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding-top:10px; cursor:pointer; text-decoration:none; color:rgba(255,255,255,0.4); font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:0.5px; text-transform:uppercase; transition:color 0.2s; }
        .chin-navbar__item--active { color:#00ffff; }
        .chin-navbar__item--active .chin-navbar__icon { filter:drop-shadow(0 0 7px #00ffff); transform:translateY(-2px); }
        .chin-navbar__dot { width:4px; height:4px; border-radius:50%; background:#00ffff; box-shadow:0 0 6px #00ffff; opacity:0; transition:opacity 0.2s; margin-top:-2px; }
        .chin-navbar__item--active .chin-navbar__dot { opacity:1; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- Стартовый экран -->
    <div id="start-screen" class="screen active game-container">
        <h1>SNAKE</h1>
        <p style="color:rgba(255,255,255,0.8);margin-bottom:20px;">Классика. Ешь, расти, не врежься!</p>
        <div style="margin-bottom:25px;"><img src="../icons/snake.png" alt="Snake" style="width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(188,19,254,0.6));"></div>

        <button id="snake-start-btn" class="start-btn" onclick="tryStartGame()">НАЧАТЬ ИГРУ</button>

        <!-- Энергия -->
        <div id="energy-container" style="display:flex;justify-content:center;margin-top:14px;"></div>

        <!-- Мини-лидерборд -->
        <div class="leaderboard-mini">
            <h3>🏆 ТОП-10 ИГРОКОВ</h3>
            <table style="width:100%;font-size:0.95rem;"><tbody id="mini-lb-body"></tbody></table>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="game-screen" class="screen game-container">
        <div class="stats-row">
            <div class="stat-box">Счёт: <span id="score" style="color:var(--neon-blue)">0</span></div>
            <div class="stat-box">Рекорд: <span id="best-score" style="color:var(--neon-blue)">0</span></div>
        </div>
        <div id="game-board" class="game-board"></div>
        <p style="margin-top:12px;color:rgba(255,255,255,0.6);font-size:14px;">← → ↑ ↓ или свайп</p>
    </div>

    <!-- Экран окончания -->
    <div id="end-screen" class="screen game-container">
        <h1 style="color:var(--neon-pink)">ИГРА ОКОНЧЕНА</h1>
        <p style="font-size:18px;">Твой результат:</p>
        <div style="font-size:62px;font-weight:900;color:var(--neon-blue);text-shadow:0 0 20px var(--neon-blue);margin:20px 0;">
            <span id="final-score">0</span>
        </div>
        <button class="restart-btn" onclick="tryStartGame()">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

        // ── Проверка бана + запуск периодической проверки ──
        if (window.enforceBanIfNeeded) {
            window.enforceBanIfNeeded();
        }
        if (window.startBanWatcher) {
            window.startBanWatcher(45000);
        }

        // Защита от свайпов
        document.documentElement.style.overscrollBehavior = 'none';
        document.body.style.overscrollBehavior = 'none';
        document.body.style.touchAction = 'none';
        document.body.style.overflow = 'hidden';

        let boardSize = 15;
        let snake = [{x:7,y:7}];
        let dx = 1, dy = 0;
        let food = {};
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('cg_snake_best') || '0', 10);
        let gameInterval = null;
        let speed = 210; // ms

        const gameBoard = document.getElementById('game-board');

        function updateBestScoreDisplay() {
            document.getElementById('best-score').textContent = bestScore;
        }

        function applySpeed() {
            clearInterval(gameInterval);
            gameInterval = setInterval(move, speed);
        }

        function initBoard() {
            gameBoard.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
            gameBoard.innerHTML = '';
            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                gameBoard.appendChild(cell);
            }
        }

        function placeFood() {
            let x, y;
            do {
                x = Math.floor(Math.random() * boardSize);
                y = Math.floor(Math.random() * boardSize);
            } while (snake.some(s => s.x === x && s.y === y));
            food = {x, y};
        }

        function render() {
            const cells = gameBoard.querySelectorAll('.cell');
            cells.forEach(cell => cell.className = 'cell');

            snake.forEach((segment, i) => {
                const idx = segment.y * boardSize + segment.x;
                if (cells[idx]) cells[idx].classList.add(i === 0 ? 'snake' : 'snake');
            });

            const foodIdx = food.y * boardSize + food.x;
            if (cells[foodIdx]) cells[foodIdx].classList.add('food');
        }

        function move() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Столкновение со стеной
            if (head.x < 0 || head.x >= boardSize || head.y < 0 || head.y >= boardSize) return endGame();

            const willEat = head.x === food.x && head.y === food.y;
            const bodyToCheck = willEat ? snake : snake.slice(0, -1);
            if (bodyToCheck.some(s => s.x === head.x && s.y === head.y)) return endGame();

            snake.unshift(head);

            if (willEat) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
                if (score % 50 === 0 && speed > 80) {
                    speed -= 20;
                    applySpeed();
                }
            } else {
                snake.pop();
            }

            render();
        }

        function startGame() {
            snake = [{x:7,y:7}];
            dx = 1; dy = 0;
            score = 0;
            speed = 210;
            document.getElementById('score').textContent = '0';
            updateBestScoreDisplay();
            initBoard();
            placeFood();
            render();

            applySpeed();

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
        }

        function endGame() {
            clearInterval(gameInterval);
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('cg_snake_best', String(bestScore));
            }
            updateBestScoreDisplay();
            document.getElementById('final-score').textContent = score;

            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('end-screen').classList.add('active');

            const user = tg?.initDataUnsafe?.user;
            if (user && score > 0) {
                const api = window.apiFetch || fetch;
                api('/api/save_score', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: user.id,
                        first_name: user.first_name || user.username || "Игрок",
                        game: 'snake',
                        score: score
                    })
                }).then(() => loadMiniLeaderboard()).catch(() => loadMiniLeaderboard());
            } else {
                loadMiniLeaderboard();
            }
        }

        async function loadMiniLeaderboard() {
            try {
                const api = window.apiFetch || fetch;
                const res = await api('/api/leaderboard/snake');
                const data = await res.json();
                const tbody = document.getElementById('mini-lb-body');
                tbody.innerHTML = '';

                if (data.leaders && data.leaders.length) {
                    data.leaders.forEach((p, i) => {
                        const tr = document.createElement('tr');
                        const tdRank = document.createElement('td');
                        tdRank.textContent = i + 1;
                        const tdName = document.createElement('td');
                        tdName.textContent = p.first_name || 'Игрок';
                        const tdScore = document.createElement('td');
                        tdScore.textContent = p.score;
                        tdScore.style.textAlign = 'right';
                        tdScore.style.fontWeight = 'bold';
                        tr.append(tdRank, tdName, tdScore);
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#888;">Пока нет рекордов</td></tr>`;
                }
            } catch(e) {}
        }

        // Управление
        document.addEventListener('keydown', e => {
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.key) === -1) return;
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
        });

        // Свайпы
        let touchStartX = 0, touchStartY = 0;
        gameBoard.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive:true});

        gameBoard.addEventListener('touchend', e => {
            const dxTouch = e.changedTouches[0].screenX - touchStartX;
            const dyTouch = e.changedTouches[0].screenY - touchStartY;

            if (Math.abs(dxTouch) > Math.abs(dyTouch)) {
                if (dxTouch > 30 && dx !== -1) { dx = 1; dy = 0; }
                if (dxTouch < -30 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (dyTouch > 30 && dy !== -1) { dx = 0; dy = 1; }
                if (dyTouch < -30 && dy !== 1) { dx = 0; dy = -1; }
            }
        }, {passive:true});

        window.onload = () => {
            updateBestScoreDisplay();
            loadMiniLeaderboard();
        };
    </script>

    <nav class="chin-navbar">
        <a class="chin-navbar__item chin-navbar__item--active" href="../index.html">
            <span class="chin-navbar__icon"><img src="../icons/games.png" alt="Игры" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,255,255,0.3));"></span>
            <span>Игры</span>
            <span class="chin-navbar__dot"></span>
        </a>
        <a class="chin-navbar__item" href="../profile.html">
            <span class="chin-navbar__icon"><img src="../icons/profile.png" alt="Профиль" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,255,255,0.3));"></span>
            <span>Профиль</span>
            <span class="chin-navbar__dot"></span>
        </a>
        <a class="chin-navbar__item" href="../shop.html">
            <span class="chin-navbar__icon"><img src="../icons/shop.png" alt="Магазин" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(255,255,255,0.3));"></span>
            <span>Магазин</span>
            <span class="chin-navbar__dot"></span>
        </a>
    </nav>

    <script src="../energy.js"></script>
    <script>
        const SNAKE_ENERGY_COST = 2;
        const trySpend = Energy.init(SNAKE_ENERGY_COST, 'snake-start-btn', 'energy-container');

        function tryStartGame() {
            if (trySpend()) startGame();
        }
    </script>
</body>
</html>
