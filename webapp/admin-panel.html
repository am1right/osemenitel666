<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Панель администратора | Chin Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="js/api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { user-select:none!important;-webkit-user-select:none!important;-webkit-tap-highlight-color:transparent!important;box-sizing:border-box; }
        html,body { overscroll-behavior:none!important;touch-action:none!important;overflow:hidden!important;height:100%!important;position:fixed!important;width:100%!important;margin:0!important;padding:0!important; }
        :root { --neon-cyan:#00ffff;--neon-pink:#ff00ff;--neon-purple:#7a04eb;--neon-blue:#00b4ff;--bg-dark:#1a103d;--glass:rgba(255,255,255,0.05); }
        body { font-family:'Rajdhani',sans-serif;background:linear-gradient(180deg,#0d081a 0%,#120b2e 35%,#1a103d 100%);color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column; }

        .bg-grid { position:fixed;top:0;left:0;width:200%;height:200%;background-image:linear-gradient(rgba(0,100,255,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,0.08) 1px,transparent 1px);background-size:40px 40px;transform:perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);animation:gridMove 20s linear infinite;z-index:0;opacity:0.4; }
        @keyframes gridMove { 0%{transform:perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px)}100%{transform:perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px)} }

        .scroll-area { position:relative;z-index:1;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-y!important;padding:16px 16px calc(80px + env(safe-area-inset-bottom,0px)); }

        /* Header */
        .page-header { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
        .back-btn { width:38px;height:38px;background:rgba(0,180,255,0.1);border:1px solid rgba(0,180,255,0.3);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all 0.2s;flex-shrink:0; }
        .back-btn:active { transform:scale(0.92);background:rgba(0,180,255,0.2); }
        .page-title { font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:#00b4ff;text-shadow:0 0 12px rgba(0,180,255,0.5); }
        .page-subtitle { font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px; }

        /* Summary stats */
        .stats-grid { display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px; }
        .stat-box { background:rgba(0,0,0,0.5);border:1px solid rgba(0,180,255,0.2);border-radius:14px;padding:14px;text-align:center; }
        .stat-box__val { font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:#00b4ff;text-shadow:0 0 10px rgba(0,180,255,0.5);line-height:1.1; }
        .stat-box__val--green { color:#00ff64;text-shadow:0 0 10px rgba(0,255,100,0.5); }
        .stat-box__val--gold { color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.5); }
        .stat-box__val--red { color:#ff4466;text-shadow:0 0 10px rgba(255,68,102,0.4); }
        .stat-box__label { font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px; }

        /* Search */
        .search-wrap { position:relative;margin-bottom:16px; }
        .search-input { width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(0,180,255,0.25);border-radius:12px;padding:12px 42px 12px 16px;font-family:'Rajdhani',sans-serif;font-size:15px;color:#fff;outline:none;-webkit-appearance:none; }
        .search-input::placeholder { color:rgba(255,255,255,0.25); }
        .search-input:focus { border-color:rgba(0,180,255,0.5);box-shadow:0 0 12px rgba(0,180,255,0.1); }
        .search-icon { position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:0.4;pointer-events:none; }

        /* Players list */
        .section-title { font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,180,255,0.5);margin-bottom:10px; }
        .player-item { display:flex;align-items:center;gap:12px;background:rgba(0,0,0,0.45);border:1px solid rgba(0,180,255,0.12);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all 0.2s; }
        .player-item:active { transform:scale(0.98);border-color:rgba(0,180,255,0.35);background:rgba(0,60,120,0.3); }
        .player-item--blocked { border-color:rgba(255,68,102,0.3);background:rgba(50,0,10,0.5); }
        .player-avatar { width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,rgba(0,180,255,0.25),rgba(0,80,200,0.15));border:1px solid rgba(0,180,255,0.3);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:#00b4ff;flex-shrink:0; }
        .player-info { flex:1;min-width:0; }
        .player-name { font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2; }
        .player-meta { font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px; }
        .player-badges { display:flex;gap:4px;flex-shrink:0;flex-direction:column;align-items:flex-end; }
        .badge { font-family:'Orbitron',sans-serif;font-size:9px;padding:3px 7px;border-radius:6px;font-weight:700;white-space:nowrap; }
        .badge--wallet { background:rgba(255,215,0,0.12);color:#ffd700;border:1px solid rgba(255,215,0,0.3); }
        .badge--blocked { background:rgba(255,68,102,0.15);color:#ff4466;border:1px solid rgba(255,68,102,0.4); }
        .badge--ref-off { background:rgba(255,120,0,0.12);color:#ff8800;border:1px solid rgba(255,120,0,0.3); }
        .player-arrow { font-size:14px;color:rgba(0,180,255,0.4);flex-shrink:0; }

        .load-more-btn { width:100%;padding:12px;background:rgba(0,180,255,0.07);border:1px solid rgba(0,180,255,0.2);border-radius:12px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:rgba(0,180,255,0.7);cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;margin-top:4px; }
        .load-more-btn:active { background:rgba(0,180,255,0.15); }

        /* Empty / Loading */
        .loading-spinner { width:28px;height:28px;border:2px solid rgba(0,180,255,0.2);border-top-color:#00b4ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:24px auto; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .empty-msg { text-align:center;padding:24px;color:rgba(255,255,255,0.25);font-size:13px; }

        /* ── Player Modal ── */
        .modal-overlay { display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);overflow-y:auto;touch-action:pan-y; }
        .modal-overlay.open { display:block; }
        .modal-inner { min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:calc(var(--admin-safe-top, 120px) + 8px) 12px calc(72px + var(--admin-safe-bottom, 0px) + env(safe-area-inset-bottom, 0px)); }
        .modal-card { width:100%;max-width:480px;background:linear-gradient(160deg,#070015 0%,#0d0030 60%,#050010 100%);border:1px solid rgba(0,180,255,0.3);border-radius:22px;padding:20px 16px;animation:modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes modalIn { from{transform:translateY(32px) scale(0.95);opacity:0} to{transform:none;opacity:1} }

        .modal-header { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
        .modal-close { width:34px;height:34px;background:rgba(255,255,255,0.07);border:none;border-radius:50%;color:rgba(255,255,255,0.5);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0; }
        .modal-avatar { width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,rgba(0,180,255,0.3),rgba(0,80,200,0.2));border:2px solid rgba(0,180,255,0.4);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700;color:#00b4ff;flex-shrink:0; }
        .modal-user-name { font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#fff; }
        .modal-user-id { font-size:12px;color:rgba(255,255,255,0.35);margin-top:2px; }

        .info-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px; }
        .info-box { background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 8px;text-align:center; }
        .info-box__val { font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:#00ffff;line-height:1.1; }
        .info-box__val--gold { color:#ffd700; }
        .info-box__val--green { color:#00ff64; }
        .info-box__label { font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px; }

        .section-sep { font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(0,180,255,0.4);margin:16px 0 10px; }

        /* Score per game */
        .game-score-row { display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 14px;margin-bottom:8px; }
        .game-score-row__name { font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;flex:1; }
        .game-score-row__score { font-family:'Orbitron',sans-serif;font-size:14px;color:#ffd700; }
        .game-score-row__played { font-size:11px;color:rgba(255,255,255,0.3);margin-left:6px; }
        .adj-btns { display:flex;gap:6px;margin-left:auto; }
        .adj-btn { width:28px;height:28px;border-radius:8px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s; }
        .adj-btn--plus { background:rgba(0,255,100,0.15);color:#00ff64;border:1px solid rgba(0,255,100,0.3); }
        .adj-btn--minus { background:rgba(255,68,102,0.12);color:#ff4466;border:1px solid rgba(255,68,102,0.3); }
        .adj-btn:active { transform:scale(0.88); }

        /* Wallet control */
        .wallet-control { background:rgba(0,0,0,0.4);border:1px solid rgba(255,215,0,0.2);border-radius:14px;padding:14px;margin-bottom:16px; }
        .wallet-balance-row { display:flex;align-items:center;gap:10px;margin-bottom:12px; }
        .wallet-bal-val { font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:#ffd700; }
        .wallet-bal-label { font-size:12px;color:rgba(255,255,255,0.35); }
        .wallet-btns { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
        .wallet-btn { padding:10px 8px;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;border:none;display:flex;align-items:center;justify-content:center;gap:5px; }
        .wallet-btn:active { transform:scale(0.96); }
        .wallet-btn--add { background:rgba(0,255,100,0.15);color:#00ff64;border:1px solid rgba(0,255,100,0.35); }
        .wallet-btn--remove { background:rgba(255,68,102,0.12);color:#ff4466;border:1px solid rgba(255,68,102,0.3); }
        .bulk-reset-btn { padding:11px 8px;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:0.3px;cursor:pointer;border:1px solid rgba(255,170,68,0.4);background:rgba(255,170,68,0.1);color:#ffaa44;transition:all 0.15s; }
        .bulk-reset-btn:active { transform:scale(0.96); }

        /* Danger zone */
        .danger-zone { background:rgba(20,0,5,0.6);border:1px solid rgba(255,68,102,0.25);border-radius:14px;padding:14px;margin-bottom:16px; }
        .danger-title { font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,68,102,0.7);margin-bottom:12px; }
        .toggle-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:10px 12px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid rgba(255,255,255,0.06); }
        .toggle-label { font-size:13px;font-weight:700;color:rgba(255,255,255,0.7); }
        .toggle-sub { font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px; }
        .toggle-switch { position:relative;width:46px;height:26px;flex-shrink:0; }
        .toggle-switch input { opacity:0;width:0;height:0; }
        .toggle-slider { position:absolute;inset:0;border-radius:13px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);cursor:pointer;transition:background 0.2s; }
        .toggle-slider:before { content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform 0.2s;box-shadow:0 2px 6px rgba(0,0,0,0.4); }
        input:checked + .toggle-slider { background:rgba(255,68,102,0.4);border-color:rgba(255,68,102,0.6); }
        input:checked + .toggle-slider:before { transform:translateX(20px);background:#ff4466; }

        /* Transactions */
        .tx-list { max-height:180px;overflow-y:auto;border-radius:10px;border:1px solid rgba(255,255,255,0.07); }
        .tx-item { display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.05); }
        .tx-item:last-child { border-bottom:none; }
        .tx-item__sign { font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;width:28px;text-align:center;flex-shrink:0; }
        .tx-item__sign--plus { color:#00ff64; }
        .tx-item__sign--minus { color:#ff4466; }
        .tx-item__desc { flex:1;font-size:12px;color:rgba(255,255,255,0.55);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .tx-item__date { font-size:10px;color:rgba(255,255,255,0.25);flex-shrink:0; }

        /* Contest results */
        .contest-result-item { display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:10px;margin-bottom:6px; }
        .contest-result-item__place { font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;width:28px;flex-shrink:0; }
        .contest-result-item__info { flex:1;min-width:0; }
        .contest-result-item__game { font-size:13px;font-weight:700;color:#fff; }
        .contest-result-item__score { font-size:11px;color:rgba(255,255,255,0.4); }
        .contest-result-item__prize { font-size:11px;color:#ffd700;flex-shrink:0; }

        /* Input modal */
        .input-modal-overlay { display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.88);backdrop-filter:blur(16px);align-items:center;justify-content:center; }
        .input-modal-overlay.open { display:flex; }
        .input-modal { width:min(340px,90vw);background:linear-gradient(160deg,#070015,#0d0030);border:1px solid rgba(0,180,255,0.3);border-radius:18px;padding:22px 18px 18px; }
        .input-modal__title { font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#00b4ff;margin-bottom:14px;text-align:center; }
        .input-modal__field { width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(0,180,255,0.25);border-radius:10px;padding:12px 14px;font-family:'Rajdhani',sans-serif;font-size:17px;color:#fff;outline:none;margin-bottom:14px;text-align:center;-webkit-appearance:none; }
        .input-modal__field:focus { border-color:rgba(0,180,255,0.5); }
        .input-modal__btns { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
        .input-modal__btn { padding:12px;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;border:none;transition:all 0.15s; }
        .input-modal__btn:active { transform:scale(0.96); }
        .input-modal__btn--cancel { background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.12); }
        .input-modal__btn--confirm { background:rgba(0,180,255,0.2);color:#00b4ff;border:1px solid rgba(0,180,255,0.4); }

        /* Toast */
        .toast { position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(80px);background:rgba(0,20,40,0.97);border:1px solid rgba(0,180,255,0.4);border-radius:12px;padding:10px 18px;font-family:'Orbitron',sans-serif;font-size:11px;color:#00b4ff;z-index:99999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.error { border-color:rgba(255,68,102,0.5);color:#ff4466; }
        .toast.success { border-color:rgba(0,255,100,0.5);color:#00ff64; }

        @media (max-width:380px) { .info-grid { grid-template-columns:repeat(2,1fr); } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="scroll-area" id="scroll-area">
        <!-- Header -->
        <div class="page-header">
            <div class="back-btn" onclick="history.back()">‹</div>
            <div style="flex:1;">
                <div class="page-title">🛡️ Панель администратора</div>
                <div class="page-subtitle" id="admin-name">Chin Games</div>
            </div>
            <button type="button" onclick="location.href='case-settings.html'" style="flex-shrink:0;padding:8px 12px;background:rgba(188,19,254,0.15);border:1px solid rgba(188,19,254,0.45);border-radius:10px;color:#e060ff;font-family:Orbitron,sans-serif;font-size:9px;font-weight:700;cursor:pointer;letter-spacing:0.5px;">📦 Кейс</button>
            <button type="button" onclick="purgeTestPlayers()" style="flex-shrink:0;padding:8px 12px;background:rgba(255,68,102,0.12);border:1px solid rgba(255,68,102,0.4);border-radius:10px;color:#ff4466;font-family:Orbitron,sans-serif;font-size:9px;font-weight:700;cursor:pointer;letter-spacing:0.5px;margin-left:6px;">🧹 Тесты</button>
        </div>

        <!-- Summary stats -->
        <div class="section-title">📊 Общая статистика</div>
        <div class="stats-grid" id="summary-grid">
            <div class="stat-box"><div class="loading-spinner" style="width:20px;height:20px;margin:4px auto;"></div></div>
            <div class="stat-box"><div class="loading-spinner" style="width:20px;height:20px;margin:4px auto;"></div></div>
        </div>

        <!-- Массовые сбросы (для всех игроков) -->
        <div class="section-title" style="color:rgba(255,68,102,0.7);">⚠️ Массовые сбросы (для ВСЕХ игроков)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            <button type="button" onclick="globalReset('scores')" class="bulk-reset-btn">🎮 Обнулить очки</button>
            <button type="button" onclick="globalReset('durak')" class="bulk-reset-btn">🃏 Сброс рейтинга Дурака</button>
            <button type="button" onclick="globalReset('energy')" class="bulk-reset-btn">⚡ Заряд = 100%</button>
            <button type="button" onclick="globalReset('wallets')" class="bulk-reset-btn">⭐ Обнулить балансы</button>
        </div>

        <!-- Search -->
        <div class="search-wrap">
            <input class="search-input" type="text" id="search-input" placeholder="Поиск по имени или ID..." autocomplete="off" spellcheck="false">
            <div class="search-icon">🔍</div>
        </div>

        <!-- Players list -->
        <div class="section-title">👥 Игроки <span id="players-count" style="color:rgba(255,255,255,0.3);"></span></div>
        <div id="players-list"><div class="loading-spinner"></div></div>
        <button class="load-more-btn" id="load-more-btn" style="display:none;" onclick="loadMorePlayers()">Загрузить ещё</button>
    </div>

    <!-- Player detail modal -->
    <div class="modal-overlay" id="player-modal">
        <div class="modal-inner">
            <div class="modal-card" id="modal-card">
                <!-- filled by JS -->
            </div>
        </div>
    </div>

    <!-- Input modal -->
    <div class="input-modal-overlay" id="input-modal">
        <div class="input-modal">
            <div class="input-modal__title" id="input-modal-title">Введите значение</div>
            <input class="input-modal__field" type="number" id="input-modal-field" placeholder="0" inputmode="numeric">
            <div class="input-modal__btns">
                <button class="input-modal__btn input-modal__btn--cancel" onclick="closeInputModal()">Отмена</button>
                <button class="input-modal__btn input-modal__btn--confirm" id="input-modal-confirm">Подтвердить</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        // Полный экран только на телефоне
        if (typeof window.initTelegramFullscreen === 'function') {
          window.initTelegramFullscreen();
        } else {
          tg.expand();
        }
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

        // Padding for safe areas (как profile.html / contest-panel.html)
        function applyPadding() {
            const sa = document.getElementById('scroll-area');
            const tgTop  = tg.contentSafeAreaInsets?.top ?? 0;
            const sysTop = tg.safeAreaInsets?.top ?? 0;
            const tgBottom  = tg.contentSafeAreaInsets?.bottom ?? 0;
            const sysBottom = tg.safeAreaInsets?.bottom ?? 0;
            const topPad = Math.max(Math.max(tgTop, sysTop), 120);
            const bottomInset = Math.max(tgBottom, sysBottom);

            document.documentElement.style.setProperty('--admin-safe-top', topPad + 'px');
            document.documentElement.style.setProperty('--admin-safe-bottom', bottomInset + 'px');

            sa.style.paddingTop = topPad + 'px';
            sa.style.paddingBottom = `calc(80px + ${bottomInset}px + env(safe-area-inset-bottom, 0px))`;
        }
        applyPadding();
        setTimeout(applyPadding, 300);
        tg.onEvent('viewportChanged', applyPadding);
        tg.onEvent('safeAreaChanged', applyPadding);
        tg.onEvent('contentSafeAreaChanged', applyPadding);

        const ENERGY_ICON_INLINE = '<img src="icons/enegry.png" alt="" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;display:inline-block;filter:drop-shadow(0 0 4px rgba(0,255,255,0.7));">';
        function formatEnergyVal(n) {
            return `${n} ${ENERGY_ICON_INLINE}`;
        }

        document.addEventListener('touchmove', e => {
            if (!e.target.closest('#scroll-area, .modal-overlay, .modal-inner, .tx-list')) e.preventDefault();
        }, { passive: false });

        const ADMIN_USERNAMES = ['rostips', 'am1right'];
        const API = 'https://chingames.duckdns.org';
        const GAME_LABELS = { math: 'Math Master', '2048': '2048', snake: 'Snake', flappy: 'Flappy Chin' };
        const GAME_LABELS_SHORT = { math: '🧮 Math', '2048': '🎮 2048', snake: '🐍 Snake', flappy: '🐦 Flappy' };
        const user = tg.initDataUnsafe?.user;

        // Guard — only admins
        if (!user || !ADMIN_USERNAMES.includes((user.username || '').toLowerCase())) {
            document.querySelector('.scroll-area').innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-family:Orbitron,sans-serif;font-size:32px;margin-bottom:16px;">🚫</div><div style="font-family:Orbitron,sans-serif;font-size:14px;color:#ff4466;">Нет доступа</div></div>';
        } else {
            document.getElementById('admin-name').textContent = '@' + user.username;
            init();
        }

        // ── State ──────────────────────────────────────────────────
        let _players = [];
        let _offset = 0;
        const LIMIT = 30;
        let _searchTimer = null;
        let _currentPlayer = null;
        let _totalPlayers = 0;

        // ── Init ───────────────────────────────────────────────────
        async function ensureSelfRegistered() {
            if (!user?.id) return;
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/ensure_self`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: user.username,
                        user_id: user.id,
                        first_name: user.first_name || user.username || 'Вы'
                    })
                });
            } catch (e) {}
        }

        function pinSelfToTop() {
            if (!user?.id) return;
            const idx = _players.findIndex(p => p.user_id === user.id);
            let entry;
            if (idx >= 0) {
                entry = { ..._players[idx], first_name: (user.first_name || user.username || 'Вы') + ' (вы)' };
                _players.splice(idx, 1);
            } else {
                entry = {
                    user_id: user.id,
                    first_name: (user.first_name || user.username || 'Вы') + ' (вы)',
                    total_games: 0,
                    wallet_balance: 0,
                    last_active: null,
                    blocked: 0,
                    ref_disabled: 0
                };
            }
            _players.unshift(entry);
        }

        async function init() {
            await ensureSelfRegistered();
            loadSummaryStats();
            loadPlayers(true);
            document.getElementById('search-input').addEventListener('input', e => {
                clearTimeout(_searchTimer);
                _searchTimer = setTimeout(() => loadPlayers(true), 400);
            });
            document.getElementById('player-modal').addEventListener('click', e => {
                if (e.target === document.getElementById('player-modal') ||
                    e.target === document.querySelector('.modal-inner')) closePlayerModal();
            });
        }

        // ── Summary stats ─────────────────────────────────────────
        async function loadSummaryStats() {
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/stats?username=${encodeURIComponent(user.username)}`);
                if (!res.ok) return;
                const d = await res.json();
                document.getElementById('summary-grid').innerHTML = `
                    <div class="stat-box">
                        <div class="stat-box__val">${d.total_players ?? 0}</div>
                        <div class="stat-box__label">Игроков</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box__val">${d.total_games ?? 0}</div>
                        <div class="stat-box__label">Всего игр</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box__val stat-box__val--gold">${d.total_wallet_stars ?? 0} ⭐</div>
                        <div class="stat-box__label">Stars в кошельках</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box__val stat-box__val--green">${d.active_today ?? 0}</div>
                        <div class="stat-box__label">Активны сегодня</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box__val stat-box__val--green">${d.active_week ?? 0}</div>
                        <div class="stat-box__label">Активны за неделю</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-box__val stat-box__val--red">${d.total_blocked ?? 0}</div>
                        <div class="stat-box__label">Заблокировано</div>
                    </div>
                `;
            } catch(e) { console.error(e); }
        }

        // ── Players list ──────────────────────────────────────────
        async function loadPlayers(reset = false) {
            if (reset) { _offset = 0; _players = []; }
            const search = document.getElementById('search-input').value.trim();
            const listEl = document.getElementById('players-list');
            if (reset) listEl.innerHTML = '<div class="loading-spinner"></div>';
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/players?username=${encodeURIComponent(user.username)}&limit=${LIMIT}&offset=${_offset}&search=${encodeURIComponent(search)}`);
                if (!res.ok) { listEl.innerHTML = '<div class="empty-msg">Ошибка загрузки</div>'; return; }
                const data = await res.json();
                _totalPlayers = data.total;
                _players = reset ? data.players : [..._players, ...data.players];
                _offset += data.players.length;
                if (reset) pinSelfToTop();
                renderPlayers();
                document.getElementById('players-count').textContent = `(${_totalPlayers})`;
                document.getElementById('load-more-btn').style.display = _offset < _totalPlayers ? 'block' : 'none';
            } catch(e) {
                listEl.innerHTML = '<div class="empty-msg">Ошибка загрузки</div>';
            }
        }

        function loadMorePlayers() { loadPlayers(false); }

        function renderPlayers() {
            const listEl = document.getElementById('players-list');
            if (!_players.length) { listEl.innerHTML = '<div class="empty-msg">Игроков не найдено</div>'; return; }
            listEl.innerHTML = _players.map(p => {
                const initial = (p.first_name || 'И')[0].toUpperCase();
                const games = p.total_games ?? 0;
                const balance = p.wallet_balance ?? 0;
                const isBlocked = p.blocked;
                const isRefOff = p.ref_disabled;
                const lastActive = p.last_active ? formatDate(p.last_active) : '—';
                let badges = '';
                if (balance > 0) badges += `<span class="badge badge--wallet">⭐ ${balance}</span>`;
                if (isBlocked) badges += `<span class="badge badge--blocked">🚫 БАН</span>`;
                if (isRefOff) badges += `<span class="badge badge--ref-off">🔕 REF</span>`;
                return `
                    <div class="player-item${isBlocked ? ' player-item--blocked' : ''}" onclick="openPlayerModal(${p.user_id})">
                        <div class="player-avatar">${initial}</div>
                        <div class="player-info">
                            <div class="player-name">${escHtml(p.first_name || 'Игрок')}</div>
                            <div class="player-meta">ID: ${p.user_id} · ${games} игр · ${lastActive}</div>
                        </div>
                        <div class="player-badges">${badges}</div>
                        <div class="player-arrow">›</div>
                    </div>`;
            }).join('');
        }

        // ── Player modal ──────────────────────────────────────────
        async function openPlayerModal(userId) {
            const modal = document.getElementById('player-modal');
            const card  = document.getElementById('modal-card');
            modal.classList.add('open');
            applyPadding();
            card.innerHTML = '<div class="loading-spinner" style="margin:40px auto;"></div>';
            document.body.style.overflow = 'hidden';
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/player/${userId}?username=${encodeURIComponent(user.username)}`);
                if (!res.ok) throw new Error('not found');
                const p = await res.json();
                _currentPlayer = p;
                renderPlayerModal(p);
            } catch(e) {
                card.innerHTML = '<div class="empty-msg">Ошибка загрузки игрока</div>';
            }
        }

        function renderPlayerModal(p) {
            const card = document.getElementById('modal-card');
            const initial = (p.first_name || 'И')[0].toUpperCase();
            const totalGames = p.total_games ?? 0;
            const balance = p.wallet?.balance ?? 0;
            const refs = p.referrals_given?.invited ?? 0;
            const refsPaid = p.referrals_given?.rewarded ?? 0;

            const scoresHtml = (p.scores || []).map(s => `
                <div class="game-score-row">
                    <div class="game-score-row__name">${GAME_LABELS_SHORT[s.game_name] || s.game_name}</div>
                    <div class="game-score-row__score">${s.score ?? 0}</div>
                    <div class="game-score-row__played">(${s.games_played ?? 0} игр)</div>
                    <div class="adj-btns">
                        <button class="adj-btn adj-btn--plus" onclick="adjustScore(${p.user_id},'${s.game_name}',1)">+</button>
                        <button class="adj-btn adj-btn--minus" onclick="adjustScore(${p.user_id},'${s.game_name}',-1)">−</button>
                    </div>
                </div>`).join('');

            const txHtml = (p.transactions || []).length === 0
                ? '<div class="empty-msg" style="padding:12px;">Транзакций нет</div>'
                : (p.transactions || []).map(t => {
                    const isPlus = t.type === 'topup' || t.type === 'admin_topup';
                    return `<div class="tx-item">
                        <div class="tx-item__sign ${isPlus ? 'tx-item__sign--plus' : 'tx-item__sign--minus'}">${isPlus ? '+' : '−'} ${t.amount} ⭐</div>
                        <div class="tx-item__desc">${escHtml(t.description || t.type)}</div>
                        <div class="tx-item__date">${formatDate(t.created_at)}</div>
                    </div>`;
                }).join('');

            const contestsHtml = (p.contest_results || []).length === 0
                ? '<div class="empty-msg" style="padding:8px;">Нет участий в соревнованиях</div>'
                : (p.contest_results || []).map(cr => {
                    const medals = ['🥇','🥈','🥉'];
                    return `<div class="contest-result-item">
                        <div class="contest-result-item__place">${medals[cr.place - 1] || '#' + cr.place}</div>
                        <div class="contest-result-item__info">
                            <div class="contest-result-item__game">${GAME_LABELS[cr.game_name] || cr.game_name}</div>
                            <div class="contest-result-item__score">+${cr.score} очков · ${formatDate(cr.started_at)}</div>
                        </div>
                        <div class="contest-result-item__prize">${cr.prize_type === 'stars' ? `⭐ ${cr.prize_value}` : '🎁 NFT'}</div>
                    </div>`;
                }).join('');

            card.innerHTML = `
                <!-- Modal header -->
                <div class="modal-header">
                    <div class="modal-avatar">${initial}</div>
                    <div style="flex:1;min-width:0;">
                        <div class="modal-user-name">${escHtml(p.first_name || 'Игрок')}</div>
                        <div class="modal-user-id">ID: ${p.user_id}${p.referred_by ? ` · Реферал от ${p.referred_by}` : ''}</div>
                    </div>
                    <button class="modal-close" onclick="closePlayerModal()">✕</button>
                </div>

                <!-- Info boxes -->
                <div class="info-grid">
                    <div class="info-box"><div class="info-box__val">${totalGames}</div><div class="info-box__label">Всего игр</div></div>
                    <div class="info-box"><div class="info-box__val info-box__val--gold">${balance} ⭐</div><div class="info-box__label">Баланс</div></div>
                    <div class="info-box"><div class="info-box__val info-box__val--green">${refs}</div><div class="info-box__label">Рефералов</div></div>
                    <div class="info-box"><div class="info-box__val info-box__val--green">${refsPaid}</div><div class="info-box__label">Выплачено</div></div>
                    <div class="info-box"><div class="info-box__val info-box__val--gold">${p.wallet?.total_topped_up ?? 0}</div><div class="info-box__label">Пополнено</div></div>
                    <div class="info-box"><div class="info-box__val">${p.wallet?.total_spent ?? 0}</div><div class="info-box__label">Потрачено</div></div>
                </div>

                <!-- Scores per game -->
                <div class="section-sep">🎮 Очки по играм</div>
                ${scoresHtml || '<div class="empty-msg">Нет игровых данных</div>'}

                <!-- Energy control -->
                <div class="section-sep" style="display:flex;align-items:center;gap:6px;"><img src="icons/enegry.png" alt="" style="width:16px;height:16px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(0,255,255,0.7));"> Энергия</div>
                <div class="wallet-control" style="border-color:rgba(0,255,255,0.25);">
                    <div class="wallet-balance-row">
                        <div>
                            <div class="wallet-bal-val" id="modal-energy-val" style="color:#00ffff;">—</div>
                            <div class="wallet-bal-label">Текущая энергия (в приложении)</div>
                        </div>
                    </div>
                    <div class="wallet-btns">
                        <button class="wallet-btn wallet-btn--add" style="border-color:rgba(0,255,255,0.35);color:#00ffff;" onclick="promptEnergy(${p.user_id}, 1)">➕ Начислить ${ENERGY_ICON_INLINE}</button>
                        <button class="wallet-btn wallet-btn--remove" onclick="promptEnergy(${p.user_id}, -1)">➖ Списать ${ENERGY_ICON_INLINE}</button>
                    </div>
                </div>

                <!-- Wallet control -->
                <div class="section-sep">⭐ Управление балансом</div>
                <div class="wallet-control">
                    <div class="wallet-balance-row">
                        <div>
                            <div class="wallet-bal-val" id="modal-wallet-val">${balance} ⭐</div>
                            <div class="wallet-bal-label">Текущий баланс</div>
                        </div>
                    </div>
                    <div class="wallet-btns">
                        <button class="wallet-btn wallet-btn--add" onclick="promptWallet(${p.user_id}, 1)">➕ Начислить Stars</button>
                        <button class="wallet-btn wallet-btn--remove" onclick="promptWallet(${p.user_id}, -1)">➖ Списать Stars</button>
                    </div>
                </div>

                <!-- Transaction history -->
                <div class="section-sep">📋 История транзакций</div>
                <div class="tx-list">${txHtml}</div>

                <!-- Contest results -->
                <div class="section-sep"><img src="icons/cup.png" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;"> Соревнования</div>
                ${contestsHtml}

                <!-- Quick resets (этот игрок) -->
                <div class="section-sep">🧹 Быстрые сбросы (этот игрок)</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    <button type="button" onclick="quickReset(${p.user_id},'scores')" class="bulk-reset-btn">🎮 Обнулить очки</button>
                    <button type="button" onclick="quickReset(${p.user_id},'durak')" class="bulk-reset-btn">🃏 Сброс Дурака</button>
                    <button type="button" onclick="quickReset(${p.user_id},'energy')" class="bulk-reset-btn">⚡ Заряд = 100%</button>
                    <button type="button" onclick="quickReset(${p.user_id},'wallet')" class="bulk-reset-btn">⭐ Обнулить баланс</button>
                    <button type="button" onclick="quickReset(${p.user_id},'referrals')" class="bulk-reset-btn">🔗 Очистить рефералов</button>
                </div>

                <!-- Danger zone -->
                <div class="section-sep" style="color:rgba(255,68,102,0.6);">⚠️ Управление аккаунтом</div>
                <div class="danger-zone">
                    <div class="danger-title">Ограничения</div>
                    <div class="toggle-row">
                        <div>
                            <div class="toggle-label">🚫 Заблокировать аккаунт</div>
                            <div class="toggle-sub">Полный запрет на использование</div>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-blocked" ${p.blocked ? 'checked' : ''} onchange="toggleBlocked(${p.user_id}, this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="toggle-row" style="margin-bottom:0;">
                        <div>
                            <div class="toggle-label">🔕 Отключить рефпрограмму</div>
                            <div class="toggle-sub">Скрыть блок в профиле и не начислять бонусы</div>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-ref" ${p.ref_disabled ? 'checked' : ''} onchange="toggleRefDisabled(${p.user_id}, this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <button type="button" onclick="deletePlayer(${p.user_id})" style="width:100%;margin-top:14px;padding:12px;background:rgba(255,68,102,0.12);border:1px solid rgba(255,68,102,0.4);border-radius:10px;color:#ff4466;font-family:Orbitron,sans-serif;font-size:10px;font-weight:700;cursor:pointer;">🗑 Удалить игрока из БД</button>
                </div>
            `;
            loadModalEnergy(p.user_id);
        }

        async function loadModalEnergy(userId) {
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/energy/balance?user_id=${userId}`);
                if (!res.ok) return;
                const d = await res.json();
                const el = document.getElementById('modal-energy-val');
                if (el) el.innerHTML = formatEnergyVal(d.amount);
            } catch(e) {}
        }

        function closePlayerModal() {
            document.getElementById('player-modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ── Score adjust ──────────────────────────────────────────
        function adjustScore(userId, gameName, direction) {
            const gameTitle = GAME_LABELS[gameName] || gameName;
            const title = direction > 0
                ? `➕ Начислить очки (${gameTitle})`
                : `➖ Списать очки (${gameTitle})`;
            openInputModal(title, async (val) => {
                if (!val || val <= 0) return;
                const delta = direction * val;
                try {
                    const api = window.apiFetch || fetch;
                    const res = await api(`${API}/api/admin/player/${userId}/score`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username: user.username, game_name: gameName, delta })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || 'error');
                    showToast(`Новый счёт: ${data.new_score}`, 'success');
                    await openPlayerModal(userId);
                    loadPlayers(true);
                } catch(e) { showToast('Ошибка начисления очков: ' + (e.message || ''), 'error'); }
            });
        }

        // ── Wallet adjust ─────────────────────────────────────────
        function promptWallet(userId, direction) {
            const title = direction > 0 ? '➕ Начислить Stars' : '➖ Списать Stars';
            openInputModal(title, async (val) => {
                if (!val || val <= 0) return;
                const amount = direction * val;
                try {
                    const api = window.apiFetch || fetch;
                    const res = await api(`${API}/api/admin/player/${userId}/wallet`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username: user.username, amount, description: direction > 0 ? 'Начисление админом' : 'Списание админом' })
                    });
                    let data;
                    try { data = await res.json(); } catch(_) { data = {}; }
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    document.getElementById('modal-wallet-val').textContent = `${data.balance} ⭐`;
                    if (_currentPlayer) _currentPlayer.wallet.balance = data.balance;
                    showToast(`Баланс: ${data.balance} ⭐`, 'success');
                    loadPlayers(true);
                } catch(e) { showToast('Ошибка Stars: ' + (e.message || ''), 'error'); }
            });
        }

        function promptEnergy(userId, direction) {
            const title = direction > 0 ? '➕ Начислить энергию' : '➖ Списать энергию';
            openInputModal(title, async (val) => {
                if (!val || val <= 0) return;
                const amount = direction * val;
                try {
                    const api = window.apiFetch || fetch;
                    const res = await api(`${API}/api/admin/player/${userId}/energy`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username: user.username, delta: amount })
                    });
                    let data;
                    try { data = await res.json(); } catch(_) { data = {}; }
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    const el = document.getElementById('modal-energy-val');
                    if (el) el.innerHTML = formatEnergyVal(data.amount);
                    showToast(`Энергия: ${data.amount}`, 'success');
                } catch(e) { showToast('Ошибка энергии: ' + (e.message || ''), 'error'); }
            });
        }

        async function deletePlayer(userId) {
            if (!confirm(`Удалить игрока ID ${userId} из базы?`)) return;
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/player/${userId}?username=${encodeURIComponent(user.username)}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('failed');
                showToast('Игрок удалён', 'success');
                closePlayerModal();
                loadPlayers(true);
                loadSummaryStats();
            } catch(e) { showToast('Ошибка удаления', 'error'); }
        }

        async function purgeTestPlayers() {
            if (!confirm('Удалить всех тестовых игроков (ID 888000–1010000)? Реальные пользователи сохранятся.')) return;
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/purge-test-players?username=${encodeURIComponent(user.username)}`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'failed');
                showToast(`Удалено тестовых: ${data.deleted}, осталось: ${data.kept}`, 'success');
                loadPlayers(true);
                loadSummaryStats();
            } catch(e) { showToast('Ошибка очистки: ' + (e.message || ''), 'error'); }
        }

        // ── Быстрые сбросы (персональные / массовые) ──────────────
        async function quickReset(userId, kind) {
            const labels = {
                scores: 'обнулить очки во всех играх',
                durak: 'сбросить рейтинг Дурака',
                energy: 'установить заряд 100%',
                wallet: 'обнулить баланс Stars',
                referrals: 'очистить всех рефералов',
            };
            if (!confirm(`Игрок ${userId}: ${labels[kind]}?`)) return;
            const ep = { scores: 'reset_scores', durak: 'reset_durak', energy: 'reset_energy', wallet: 'reset_wallet', referrals: 'reset_referrals' }[kind];
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/player/${userId}/${ep}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user.username }),
                });
                const d = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(d.detail || `HTTP ${res.status}`);
                showToast('Готово', 'success');
                await openPlayerModal(userId);
                loadPlayers(true);
            } catch(e) { showToast('Ошибка: ' + (e.message || ''), 'error'); }
        }

        async function globalReset(kind) {
            const labels = {
                scores: 'ОБНУЛИТЬ очки во всех играх у ВСЕХ игроков',
                durak: 'СБРОСИТЬ рейтинг Дурака у ВСЕХ',
                energy: 'установить заряд 100% ВСЕМ игрокам',
                wallets: 'ОБНУЛИТЬ балансы Stars у ВСЕХ',
            };
            if (!confirm(`⚠️ ${labels[kind]}?\nДействие необратимо.`)) return;
            if (!confirm('Подтверди ещё раз: применить ко ВСЕМ игрокам?')) return;
            try {
                const api = window.apiFetch || fetch;
                const res = await api(`${API}/api/admin/reset_all/${kind}?username=${encodeURIComponent(user.username)}`, { method: 'POST' });
                const d = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(d.detail || `HTTP ${res.status}`);
                const extra = (d.affected != null) ? `: затронуто ${d.affected}` : (d.deleted != null ? `: удалено ${d.deleted}` : '');
                showToast('Готово' + extra, 'success');
                loadPlayers(true);
                loadSummaryStats();
            } catch(e) { showToast('Ошибка: ' + (e.message || ''), 'error'); }
        }

        // ── Block toggle ──────────────────────────────────────────
        async function toggleBlocked(userId, blocked) {
            try {
                const api = window.apiFetch || fetch;
                await api(`${API}/api/admin/player/${userId}/block`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user.username, blocked })
                });
                showToast(blocked ? '🚫 Заблокирован' : '✅ Разблокирован', blocked ? 'error' : 'success');
                loadPlayers(true);
            } catch(e) { showToast('Ошибка', 'error'); }
        }

        async function toggleRefDisabled(userId, disabled) {
            try {
                const api = window.apiFetch || fetch;
                await api(`${API}/api/admin/player/${userId}/ref_disable`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user.username, disabled })
                });
                showToast(disabled ? '🔕 Реф. выключен' : '✅ Реф. включён', disabled ? 'error' : 'success');
            } catch(e) { showToast('Ошибка', 'error'); }
        }

        // ── Input modal ───────────────────────────────────────────
        let _inputCallback = null;

        function openInputModal(title, callback) {
            _inputCallback = callback;
            document.getElementById('input-modal-title').textContent = title;
            document.getElementById('input-modal-field').value = '';
            document.getElementById('input-modal').classList.add('open');
            setTimeout(() => document.getElementById('input-modal-field').focus(), 100);
            document.getElementById('input-modal-confirm').onclick = () => {
                const raw = document.getElementById('input-modal-field').value.trim();
                const val = parseInt(raw, 10);
                if (isNaN(val) || val <= 0) { showToast('Введите положительное число', 'error'); return; }
                const cb = _inputCallback;
                closeInputModal();
                if (cb) cb(val);
            };
        }

        function closeInputModal() {
            document.getElementById('input-modal').classList.remove('open');
            _inputCallback = null;
        }

        document.getElementById('input-modal').addEventListener('click', e => {
            if (e.target === document.getElementById('input-modal')) closeInputModal();
        });

        // ── Helpers ────────────────────────────────────────────────
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (type ? ' ' + type : '');
            void t.offsetWidth;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function formatDate(str) {
            if (!str) return '—';
            try {
                const d = new Date(str.replace(' ', 'T') + (str.includes('+') ? '' : 'Z'));
                return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit' });
            } catch(e) { return str.slice(0, 10); }
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
